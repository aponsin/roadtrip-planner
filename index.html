// ── AUTOCOMPLETE SETUP ─────────────────────────────────────────────────────────
let acInitialised = false;
function setupAddressAutocomplete() {
  if (acInitialised) return;
  acInitialised = true;

  initAutocomplete('f-departure', (name) => {
    updateAddrLink('departure');
    markRouteStale();
  });
  initAutocomplete('f-arrival', (name) => {
    updateAddrLink('arrival');
    markRouteStale();
  });
  initAutocomplete('f-sleep-addr', (name) => {
    updateSleepLink();
  });
}

// ── AUTOCOMPLETE ───────────────────────────────────────────────────────────────
const acTimers = {};

function initAutocomplete(inputId, onSelect) {
  const input = document.getElementById(inputId);
  if (!input) return;

  input.addEventListener('input', () => {
    clearTimeout(acTimers[inputId]);
    acDropdownClose(inputId);
    const q = input.value.trim();
    if (q.length < 3) return;
    acTimers[inputId] = setTimeout(() => acFetch(inputId, q, onSelect), 350);
  });

  input.addEventListener('keydown', e => {
    const dd = document.getElementById('ac-' + inputId);
    if (!dd) return;
    const items = dd.querySelectorAll('.ac-item');
    let active = dd.querySelector('.ac-item.active');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = active ? active.nextElementSibling : items[0];
      if (next) { active?.classList.remove('active'); next.classList.add('active'); next.scrollIntoView({ block: 'nearest' }); }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = active?.previousElementSibling;
      if (prev) { active.classList.remove('active'); prev.classList.add('active'); prev.scrollIntoView({ block: 'nearest' }); }
    } else if (e.key === 'Enter') {
      if (active) { e.preventDefault(); active.click(); }
    } else if (e.key === 'Escape') {
      acDropdownClose(inputId);
    }
  });

  // Close on outside click
  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !document.getElementById('ac-' + inputId)?.contains(e.target))
      acDropdownClose(inputId);
  });
}

async function acFetch(inputId, q, onSelect) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`,
      { headers: { 'Accept-Language': 'en' } }
    );
    if (!r.ok) return;
    const results = await r.json();
    acDropdownShow(inputId, results, onSelect);
  } catch (_) {}
}

function acDropdownShow(inputId, results, onSelect) {
  acDropdownClose(inputId);
  if (!results.length) return;
  const input = document.getElementById(inputId);
  const wrap  = input.closest('.addr-wrap');
  const ul = document.createElement('ul');
  ul.className = 'ac-dropdown'; ul.id = 'ac-' + inputId;
  // Prevent the dropdown from stealing focus from the input
  ul.addEventListener('mousedown', e => e.preventDefault());
  results.forEach(res => {
    const parts = res.display_name.split(',').map(s => s.trim());
    // Use first 2 meaningful parts as the fill value (e.g. "Eiffel Tower, Paris")
    const fillValue = parts.slice(0, 2).join(', ');
    const shortName = parts[0];
    const detail    = parts.slice(1).join(', ');
    const li = document.createElement('li');
    li.className = 'ac-item';
    li.title = res.display_name; // full text tooltip
    li.innerHTML = `<span class="ac-item-name">${esc(shortName)}</span><span class="ac-item-detail">${esc(detail)}</span>`;
    li.addEventListener('click', () => {
      input.value = fillValue;
      input.dispatchEvent(new Event('input', { bubbles: true }));
      acDropdownClose(inputId);
      onSelect(fillValue, res);
    });
    ul.appendChild(li);
  });
  wrap.appendChild(ul);
}

function acDropdownClose(inputId) {
  document.getElementById('ac-' + inputId)?.remove();
}

async function geocode(address) {
  const r = await fetch(
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,
    { headers: { 'Accept-Language': 'en' } }
  );
  if (!r.ok) return null;
  const d = await r.json();
  return d.length ? { lat: d[0].lat, lon: d[0].lon } : null;
}

async function fetchRoute() {
  const depVal = document.getElementById('f-departure')?.value.trim();
  const arrVal = document.getElementById('f-arrival')?.value.trim();
  if (!depVal || !arrVal) { alert('Enter both departure and arrival addresses first.'); return; }

  const box = document.getElementById('route-result');
  box.innerHTML = '<span style="font-size:12px;color:var(--muted)">Fetching route…</span>';

  try {
    const [dep, arr] = await Promise.all([geocode(depVal), geocode(arrVal)]);
    if (!dep) throw new Error(`Could not geocode: "${depVal}"`);
    if (!arr) throw new Error(`Could not geocode: "${arrVal}"`);

    const r = await fetch(
      `https://router.project-osrm.org/route/v1/driving/${dep.lon},${dep.lat};${arr.lon},${arr.lat}?overview=false`
    );
    if (!r.ok) throw new Error('Routing service error');
    const data = await r.json();
    if (!data.routes?.length) throw new Error('No route found between these locations');

    const { distance: distM, duration: durS } = data.routes[0];
    routeData = { distanceM: distM, drivingSeconds: durS, timeOnRoadH: calcTimeOnRoad(distM / 1609.34) };
    renderRouteChip(box, depVal, arrVal, distM, durS);
  } catch (err) {
    routeData = null;
    box.innerHTML = `<span style="color:#dc2626;font-size:12px">⚠ ${esc(err.message)}</span>
      <button class="btn btn-g" onclick="fetchRoute()" style="margin-left:8px;padding:3px 8px;font-size:11px">Retry</button>`;
  }
}

function renderRouteChip(box, depVal, arrVal, distM, durS) {
  const km     = (distM / 1000).toFixed(1);
  const miNum  = distM / 1609.34;
  const mi     = miNum.toFixed(1);
  const torH   = calcTimeOnRoad(miNum);
  const dh     = Math.floor(durS / 3600);
  const dm     = Math.round((durS % 3600) / 60);
  const durStr = dh > 0 ? `${dh}h ${dm}m` : `${dm}m`;
  const mapsDir = `https://www.google.com/maps/dir/${encodeURIComponent(depVal)}/${encodeURIComponent(arrVal)}`;
  box.innerHTML = `<div class="route-chip">
    <span>📏 ${km} km <span style="opacity:.55">(${mi} mi)</span></span>
    <span style="opacity:.4">·</span>
    <span>⏱ ~${durStr} driving</span>
    <span style="opacity:.4">·</span>
    <span title="Estimated total road time including breaks">🕐 ${torH}h on road</span>
    <a href="${mapsDir}" target="_blank">↗ Directions</a>
    <button class="refresh-btn" onclick="fetchRoute()" title="Refresh route data"
      style="background:none;border:none;cursor:pointer;font-size:13px;padding:0 2px;opacity:.6;line-height:1">↻</button>
  </div>`;
}

function calcTimeOnRoad(miles) {
  // Formula: ROUNDUP( (floor(miles/50 / 3) * 0.5) + miles/50 )
  // Adds a 30-min break per each complete 3-hour driving block, then rounds up to nearest hour
  const dh = miles / 50;
  return Math.ceil(dh + Math.floor(dh / 3) * 0.5);
}

function fmtDist(m) {
  return `${(m / 1000).toFixed(0)} km / ${(m / 1609.34).toFixed(0)} mi`;
}

function fmtDrivingDur(s) {
  const h = Math.floor(s / 3600), m = Math.round((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// ── EVENT LINKING ──────────────────────────────────────────────────────────────
function linkedPrev(evId) {
  return events.find(e => e.linkedNextId === evId) || null;
}

function clearLinksTo(evId) {
  events.forEach(e => { if (e.linkedNextId === evId) e.linkedNextId = null; });
}

async function refreshEventRoute(ev) {
  if (!ev.departure || !ev.arrival) return;
  try {
    const [dep, arr] = await Promise.all([geocode(ev.departure), geocode(ev.arrival)]);
    if (!dep || !arr) return;
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${dep.lon},${dep.lat};${arr.lon},${arr.lat}?overview=false`);
    if (!r.ok) return;
    const data = await r.json();
    if (!data.routes?.length) return;
    const { distance: distM, duration: durS } = data.routes[0];
    ev.distanceM = distM; ev.drivingSeconds = durS;
    ev.timeOnRoadH = calcTimeOnRoad(distM / 1609.34);
  } catch(_) {}
}

async function handleDrivingLinks(savedEv) {
  if (savedEv.category !== 'driving' || !savedEv.tripId) return;

  if (savedEv.linkedNextId) {
    // Already linked — propagate arrival change to linked event
    const next = events.find(e => e.id === savedEv.linkedNextId);
    if (next) {
      next.departure = savedEv.arrival || '';
      updateAddrLinkOnEvent(next);
      if (next.departure && next.arrival) await refreshEventRoute(next);
      save(); render();
    }
    return;
  }

  // Try to auto-link to the chronologically next driving event in the same trip
  if (!savedEv.arrival) return;
  const next = events
    .filter(e => e.tripId === savedEv.tripId && e.category === 'driving'
              && e.id !== savedEv.id && e.start > savedEv.start)
    .sort((a, b) => a.start - b.start)[0];
  if (!next) return;

  // Only auto-link if the next event has no departure yet, or is already linked from us
  const prevOfNext = linkedPrev(next.id);
  if (next.departure && prevOfNext?.id !== savedEv.id) return;

  savedEv.linkedNextId = next.id;
  next.departure = savedEv.arrival;
  if (next.departure && next.arrival) await refreshEventRoute(next);
  save(); render();
}

function disconnectLink(evId) {
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  if (ev.linkedNextId) {
    ev.linkedNextId = null;
  } else {
    const src = linkedPrev(evId);
    if (src) src.linkedNextId = null;
  }
  // Update form badges if still open
  if (editingId === evId || (editingId && events.find(e => e.id === editingId && e.linkedNextId === evId))) {
    updateLinkStatusBadges(editingId);
  }
  save(); render();
}

async function reconnectLink(evId) {
  const ev = events.find(e => e.id === evId);
  if (!ev || ev.category !== 'driving' || !ev.tripId) return;
  // Find the next driving event in the same trip not already linked to something else
  const next = events
    .filter(e => e.tripId === ev.tripId && e.category === 'driving'
              && e.id !== ev.id && e.start > ev.start
              && !linkedPrev(e.id))
    .sort((a, b) => a.start - b.start)[0];
  if (!next) { alert('No unlinked driving event found after this one in the same trip.'); return; }
  ev.linkedNextId = next.id;
  if (ev.arrival) {
    next.departure = ev.arrival;
    if (next.arrival) await refreshEventRoute(next);
  }
  if (editingId === evId) updateLinkStatusBadges(evId);
  save(); render();
}

function updateAddrLinkOnEvent(ev) {
  // No-op — route data is on the event object itself; nothing to update in DOM for background updates
}

function updateLinkStatusBadges(evId) {
  const row    = document.getElementById('link-status-row');
  const srcBdg = document.getElementById('link-src-badge');
  const dstBdg = document.getElementById('link-dst-badge');
  if (!row || !srcBdg || !dstBdg) return;

  const ev  = events.find(e => e.id === evId);
  const src = linkedPrev(evId);
  const dst = ev?.linkedNextId ? events.find(e => e.id === ev.linkedNextId) : null;

  // Check if there's a linkable next event (for reconnect button)
  const canReconnect = !dst && ev?.category === 'driving' && ev?.tripId &&
    events.some(e => e.tripId === ev.tripId && e.category === 'driving'
                  && e.id !== evId && e.start > ev.start && !linkedPrev(e.id));

  srcBdg.style.display = (dst || canReconnect) ? 'flex' : 'none';
  dstBdg.style.display = src ? 'flex' : 'none';
  row.style.display    = (dst || src || canReconnect) ? '' : 'none';

  if (dst) srcBdg.innerHTML =
    `⛓ Linked to: <em style="font-style:normal">${esc(dst.title)}</em>
     <button onclick="disconnectLink(${evId})">✕ Disconnect</button>`;
  else if (canReconnect) srcBdg.innerHTML =
    `<button onclick="reconnectLink(${evId})" style="background:#f0fdf4;border:1px solid #86efac;color:#166534">🔗 Connect to next driving event</button>`;
  if (src) dstBdg.innerHTML =
    `⛓ Departure fed by: <em style="font-style:normal">${esc(src.title)}</em>
     <button onclick="disconnectLink(${evId})">✕ Disconnect</button>`;
}

function submitForm() {
  const title   = document.getElementById('f-title').value.trim();
  const cat     = document.getElementById('f-cat').value;
  const tripRaw = document.getElementById('f-trip').value;
  const tripId  = tripRaw ? parseInt(tripRaw) : null;
  if (tripId) lastTripId = tripId;
  const start = getStartFromFields();
  const durH  = parseInt(document.getElementById('f-dur-h').value) || 0;
  const durM  = parseInt(document.getElementById('f-dur-m').value) || 0;
  const desc  = document.getElementById('f-desc').value.trim();

  if (!title)  { alert('Please enter a title.');     return; }
  if (!start)  { alert('Please set a start time.');  return; }
  const durMs = (durH * 60 + durM) * 60000;
  if (durMs <= 0) { alert('Duration must be at least 15 minutes.'); return; }

  const end = new Date(start.getTime() + durMs);

  // Sleeping-specific fields
  const sleepingAddress = cat === 'sleeping' ? (document.getElementById('f-sleep-addr')?.value.trim() || '') : '';

  // Driving-specific fields
  const departure       = cat === 'driving' ? (document.getElementById('f-departure')?.value.trim() || '') : '';
  const arrival         = cat === 'driving' ? (document.getElementById('f-arrival')?.value.trim()   || '') : '';
  const distanceM       = cat === 'driving' && routeData ? routeData.distanceM      : null;
  const drivingSeconds  = cat === 'driving' && routeData ? routeData.drivingSeconds : null;
  const timeOnRoadH     = cat === 'driving' && routeData ? routeData.timeOnRoadH    : null;

  const drivingFields = { departure, arrival, distanceM, drivingSeconds, timeOnRoadH, sleepingAddress };

  let savedEv;
  if (editingId !== null) {
    savedEv = events.find(e => e.id === editingId);
    // Preserve existing link if category stays driving, otherwise drop it
    const keepLink = cat === 'driving' ? savedEv?.linkedNextId : null;
    if (savedEv) Object.assign(savedEv, { title, category: cat, tripId, start, end, description: desc, ...drivingFields, linkedNextId: keepLink ?? null });
  } else {
    savedEv = { id: nextEvId++, title, category: cat, tripId, start, end, description: desc, ...drivingFields, linkedNextId: null };
    events.push(savedEv);
    closeForm(); render();
    if (savedEv?.category === 'driving') handleDrivingLinks(savedEv);
    recordUndo('add', savedEv);
    return;
  }
  closeForm(); render();
  if (savedEv?.category === 'driving') handleDrivingLinks(savedEv);
}

function deleteEditingEvent() {
  if (editingId === null) return;
  const ev = events.find(e => e.id === editingId);
  if (!ev) return;
  const snap = { ...ev };
  clearLinksTo(editingId);
  events = events.filter(e => e.id !== editingId);
  closeForm(); render();
  recordUndo('delete', snap);
}

function showPop(e, ev) {
  popEvId = ev.id;
  const cat  = CATS[ev.category] || CATS.misc;
  const trip = trips.find(t => t.id === ev.tripId);

  const tripChip = trip
    ? `<span class="pop-chip" style="color:${trip.color};border-color:${trip.color};background:${trip.color}18">${esc(trip.name)}</span>`
    : '';

  document.getElementById('pop-cat-row').innerHTML =
    `<span class="pop-chip" style="background:${cat.bg};color:${cat.color};border-color:${cat.border}">${cat.emoji} ${cat.label}</span>${tripChip}`;
  document.getElementById('pop-title').textContent = ev.title;
  document.getElementById('pop-time').textContent  =
    `${fmtDT(ev.start)} → ${fmtDT(ev.end)}  (${fmtDur(ev.end - ev.start)})`;

  const descEl = document.getElementById('pop-desc');
  descEl.textContent    = ev.description || '';
  descEl.style.display  = ev.description ? 'block' : 'none';

  // Driving route info / Sleeping location
  const drivingEl = document.getElementById('pop-driving');
  if (ev.category === 'sleeping' && ev.sleepingAddress) {
    const q = encodeURIComponent(ev.sleepingAddress);
    drivingEl.innerHTML = `<div>📍 <a href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank">${esc(ev.sleepingAddress)}</a></div>`;
    drivingEl.style.display = 'flex';
  } else if (ev.category === 'driving' && (ev.departure || ev.arrival || ev.distanceM != null)) {
    let html = '';
    if (ev.departure) {
      const q = encodeURIComponent(ev.departure);
      html += `<div>🚩 <a href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank">${esc(ev.departure)}</a></div>`;
    }
    if (ev.arrival) {
      const q = encodeURIComponent(ev.arrival);
      html += `<div>🏁 <a href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank">${esc(ev.arrival)}</a></div>`;
    }
    if (ev.distanceM != null) {
      const torH = ev.timeOnRoadH ?? calcTimeOnRoad(ev.distanceM / 1609.34);
      html += `<div class="pop-route-stat">📏 ${fmtDist(ev.distanceM)} &nbsp;·&nbsp; ⏱ ~${fmtDrivingDur(ev.drivingSeconds)} driving &nbsp;·&nbsp; 🕐 ${torH}h on road</div>`;
    }
    if (ev.departure && ev.arrival) {
      const dir = `https://www.google.com/maps/dir/${encodeURIComponent(ev.departure)}/${encodeURIComponent(ev.arrival)}`;
      html += `<div><a href="${dir}" target="_blank">↗ Open directions in Google Maps</a></div>`;
    }
    // Link info
    const lnkDst = ev.linkedNextId ? events.find(x => x.id === ev.linkedNextId) : null;
    const lnkSrc = linkedPrev(ev.id);
    const popBtnStyle = 'margin-left:6px;background:none;border:1px solid #94a3b8;border-radius:4px;padding:1px 6px;font-size:10px;cursor:pointer';
    if (lnkDst) html += `<div style="margin-top:2px">⛓ → <em style="font-style:normal">${esc(lnkDst.title)}</em>
      <button onclick="disconnectLink(${ev.id});closePop();renderSidebar()" style="${popBtnStyle}">✕ Disconnect</button></div>`;
    if (lnkSrc) html += `<div style="margin-top:2px">⛓ ← <em style="font-style:normal">${esc(lnkSrc.title)}</em>
      <button onclick="disconnectLink(${ev.id});closePop();renderSidebar()" style="${popBtnStyle}">✕ Disconnect</button></div>`;
    // Reconnect option — show if no forward link but a linkable next event exists
    if (!lnkDst && ev.tripId) {
      const canRec = events.some(e => e.tripId === ev.tripId && e.category === 'driving'
                                   && e.id !== ev.id && e.start > ev.start && !linkedPrev(e.id));
      if (canRec) html += `<div style="margin-top:4px">
        <button onclick="reconnectLink(${ev.id}).then(()=>{closePop();renderSidebar()})"
          style="background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer">🔗 Connect to next driving event</button></div>`;
    }
    drivingEl.innerHTML  = html;
    drivingEl.style.display = 'flex';
  } else {
    drivingEl.style.display = 'none';
  }

  const pop = document.getElementById('pop');
  pop.style.display = 'block';
  const vw = window.innerWidth, vh = window.innerHeight;
  pop.style.left = Math.min(e.clientX + 12, vw - 296) + 'px';
  pop.style.top  = Math.min(e.clientY + 12, vh - 220) + 'px';
}

function editFromPop() {

// ── HOVER OVERLAY ──────────────────────────────────────────────────────────────
function showBarHover(e, evId) {
  const ev  = events.find(item => item.id === evId);
  const bar = e.currentTarget;
  if (!ev || !bar) return;

  // Show if title is clipped OR if there's route distance to display
  const lbl = bar.querySelector('.ev-lbl');

    ? `${(ev.distanceM/1000).toFixed(0)} km · 🕐 ${ev.timeOnRoadH ?? calcTimeOnRoad(ev.distanceM/1609.34)}h on road`
    : fmtDur(ev.end - ev.start);
  ov.innerHTML = `<span>${cat.emoji} ${esc(ev.title)}</span><span style="opacity:.55;font-size:11px;margin-left:10px;flex-shrink:0">${routeSuffix}</span>`;

}

function hideBarHover() {
  document.getElementById('ev-hover').style.display = 'none';
}

// ── DRAG ───────────────────────────────────────────────────────────────────────
function barDown(e, evId) {
  if (e.button !== 0) return; // ignore right-click / middle-click
  e.preventDefault(); e.stopPropagation();
  hideBarHover();
  const ev = events.find(item => item.id === evId);
  if (!ev) return;
  dragState = {
    eventId:   evId,
    origStart: new Date(ev.start),
    duration:  ev.end.getTime() - ev.start.getTime(),
    startX: e.clientX, startY: e.clientY,
    moved: false,
    lastT: 0,
  };
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('mouseup',   dragUp);
}

function dragMove(e) {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
  if (!dragState.moved && Math.abs(dx) + Math.abs(dy) < 5) return;
  dragState.moved = true;
  closePop();

  const t = performance.now();
  if (t - dragState.lastT < 16) return;
  dragState.lastT = t;

  const day = dayUnderMouse(e);
  if (day) {
    const os = dragState.origStart;
    const ns = new Date(day.getFullYear(), day.getMonth(), day.getDate(), os.getHours(), os.getMinutes());
    const ev = events.find(item => item.id === dragState.eventId);
    if (ev) {
      ev.start = ns;
      ev.end   = new Date(ns.getTime() + dragState.duration);
      renderCal();
    }
  }
}

function dragUp(e) {
  document.removeEventListener('mousemove', dragMove);
  document.removeEventListener('mouseup',   dragUp);
  if (!dragState) return;

  if (!dragState.moved) {
    const ev = events.find(item => item.id === dragState.eventId);
    if (ev) showPop(e, ev);
  } else {
    dragState = null;
    save(); renderCal();
    return;
  }
  dragState = null;
}

function dayUnderMouse(e) {
  const rows = document.querySelectorAll('.week-row');
  for (let w = 0; w < rows.length; w++) {
    const rr = rows[w].getBoundingClientRect();
    if (e.clientY < rr.top || e.clientY > rr.bottom) continue;
    const tl = rows[w].querySelector('.timeline');
    const tr = tl.getBoundingClientRect();
    const pct = Math.max(0, Math.min(0.9999, (e.clientX - tr.left) / tr.width));
    const dayIdx = Math.floor(pct * 7);
    return addDays(new Date(viewStart.getTime() + w * WK), dayIdx);
  }
  return null;
}

function onDocClick(e) {

  if (pop.style.display !== 'none' && !pop.contains(e.target) && !e.target.closest('.ev-bar')) {
    closePop();
  }

function onKeyDown(e) {
  if (e.key === 'Escape') { closePop(); closeForm(); closeCtxMenu(); document.getElementById('trip-viz-overlay').classList.remove('open'); }
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    if (e.shiftKey) { redoLastAction(); }
    else if (lastUndoable) { undoLastAction(); }
    else if (lastRedoable) { redoLastAction(); } // nothing to undo → redo
  }
}

// ── UTIL ───────────────────────────────────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── UNDO / REDO ────────────────────────────────────────────────────────────────
let lastUndoable = null; // { type, snapshot | eventsSnapshot }
let lastRedoable = null;

function deepCopyEvents() {
  return events.map(e => ({ ...e, start: new Date(e.start), end: new Date(e.end) }));
}

function recordUndo(type, snapshot) {
  lastUndoable = {
    type,
    snapshot: { ...snapshot, start: new Date(snapshot.start), end: new Date(snapshot.end) },
  };
  lastRedoable = null;
  refreshUndoBtns();
}

// Records undo for day-ops: stores full events snapshot + the op params for redo
function recordDayOpUndo(op, date) {
  lastUndoable = { type: 'day-op', op, date, eventsSnapshot: deepCopyEvents() };
  lastRedoable = null;
  refreshUndoBtns();
}

function refreshUndoBtns() {
  const btnUndo = document.getElementById('btn-undo');
  const btnRedo = document.getElementById('btn-redo');
  if (!btnUndo || !btnRedo) return;
  if (lastUndoable) { btnUndo.classList.add('active'); btnUndo.disabled = false; }
  else              { btnUndo.classList.remove('active'); btnUndo.disabled = true; }
  if (lastRedoable) { btnRedo.classList.add('active'); btnRedo.disabled = false; }
  else              { btnRedo.classList.remove('active'); btnRedo.disabled = true; }
}

function undoLastAction() {
  if (!lastUndoable) return;
  const u = lastUndoable;
  if (u.type === 'add') {
    clearLinksTo(u.snapshot.id);
    events = events.filter(e => e.id !== u.snapshot.id);
  } else if (u.type === 'delete') {
    events.push(u.snapshot);
  } else if (u.type === 'day-op') {
    // Save current state for redo, then restore pre-op snapshot
    lastRedoable = { type: 'day-op', op: u.op, date: u.date, eventsSnapshot: deepCopyEvents() };
    events = u.eventsSnapshot.map(e => ({ ...e, start: new Date(e.start), end: new Date(e.end) }));
    lastUndoable = null;
    refreshUndoBtns();
    save(); render();
    return;
  }
  lastRedoable = { type: u.type, snapshot: u.snapshot };
  lastUndoable = null;
  refreshUndoBtns();
  save(); render();
}

function redoLastAction() {
  if (!lastRedoable) return;
  const r = lastRedoable;
  if (r.type === 'add') {
    events.push(r.snapshot);
  } else if (r.type === 'delete') {
    clearLinksTo(r.snapshot.id);
    events = events.filter(e => e.id !== r.snapshot.id);
  } else if (r.type === 'day-op') {
    // Save current state for undo, then restore post-op snapshot
    lastUndoable = { type: 'day-op', op: r.op, date: r.date, eventsSnapshot: deepCopyEvents() };
    events = r.eventsSnapshot.map(e => ({ ...e, start: new Date(e.start), end: new Date(e.end) }));
    lastRedoable = null;
    refreshUndoBtns();
    save(); render();
    return;
  }
  lastUndoable = { type: r.type, snapshot: r.snapshot };
  lastRedoable = null;
  refreshUndoBtns();
  save(); render();
}

// ── DAY CONTEXT MENU ─────────────────────────────────────────────────────────
let ctxMenuDate = null;

function showDayMenu(e, isoDate, scopeTripId) {
  e.stopPropagation();

  // Parse the clicked date
  const parts = isoDate.split('-');
  ctxMenuDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));

  const dateLabel = ctxMenuDate.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
  let html = `<div class="ctx-date-header">${dateLabel}</div>`;

  if (scopeTripId !== undefined) {
    // Scoped to a specific trip (right-clicked on its band)
    if (scopeTripId === null) {
      html += '<div class="ctx-section-label"><span class="ctx-dot" style="background:#94a3b8"></span>Unassigned events</div>';
    } else {
      const t = trips.find(t => t.id === scopeTripId);
      if (t) html += `<div class="ctx-section-label"><span class="ctx-dot" style="background:${t.color}"></span>${esc(t.name)}</div>`;
    }
    const id = scopeTripId === null ? 'null' : scopeTripId;
    html += `<div class="ctx-item" onclick="executeDayOp('extend',${id})">📅 Extend by a day</div>`;
    html += `<div class="ctx-item" onclick="executeDayOp('compress',${id})">🗜️ Compress by a day</div>`;
  } else {
    // No scope — show all trips
    const tripsWithEvents = trips.filter(t => events.some(ev => ev.tripId === t.id));
    const hasUnassigned   = events.some(ev => ev.tripId == null);
    const totalGroups     = tripsWithEvents.length + (hasUnassigned ? 1 : 0);
    if (totalGroups === 0) {
      html += '<div class="ctx-item ctx-disabled">No trips found</div>';
    } else {
      for (const t of tripsWithEvents) {
        html += `<div class="ctx-section-label"><span class="ctx-dot" style="background:${t.color}"></span>${esc(t.name)}</div>`;
        html += `<div class="ctx-item ctx-sub" onclick="executeDayOp('extend',${t.id})">📅 Extend by a day</div>`;
        html += `<div class="ctx-item ctx-sub" onclick="executeDayOp('compress',${t.id})">🗜️ Compress by a day</div>`;
      }
      if (hasUnassigned) {
        html += '<div class="ctx-section-label"><span class="ctx-dot" style="background:#94a3b8"></span>Unassigned</div>';
        html += '<div class="ctx-item ctx-sub" onclick="executeDayOp(\'extend\',null)">📅 Extend by a day</div>';
        html += '<div class="ctx-item ctx-sub" onclick="executeDayOp(\'compress\',null)">🗜️ Compress by a day</div>';
      }
      if (totalGroups > 1) {
        html += '<div class="ctx-divider"></div>';
        html += '<div class="ctx-item" onclick="executeDayOp(\'extend\',\'all\')">📅 Extend ALL trips by a day</div>';
        html += '<div class="ctx-item" onclick="executeDayOp(\'compress\',\'all\')">🗜️ Compress ALL trips by a day</div>';
      }
    }
  }

  const menu = document.getElementById('day-ctx-menu');
  menu.innerHTML = html;

  // Position near cursor, stay on screen
  const mw = 240, mh = menu.childElementCount * 36 + 16;
  const mx = (e.clientX + 4 + mw > window.innerWidth)  ? e.clientX - mw - 4 : e.clientX + 4;
  const my = (e.clientY + 4 + mh > window.innerHeight) ? e.clientY - mh - 4 : e.clientY + 4;
  menu.style.cssText = `display:block; position:fixed; z-index:9999; left:${mx}px; top:${my}px; min-width:${mw}px;`;
}

function closeCtxMenu() {
  document.getElementById('day-ctx-menu').style.display = 'none';
}

function executeDayOp(op, tripId) {
  closeCtxMenu();
  if (!ctxMenuDate) return;
  const date = ctxMenuDate;
  recordDayOpUndo(op, date);  // snapshot BEFORE changes

  const boundary = new Date(date); boundary.setHours(0,0,0,0);
  const nextDay  = new Date(boundary.getTime() + DAY);

  // tripId === 'all' → all events; null → unassigned only; number → that trip
  const affected = ev => {
    if (tripId === 'all') return true;
    if (tripId === null)  return ev.tripId == null;
    return ev.tripId === tripId;
  };

  if (op === 'extend') {
    for (const ev of events) {
      if (!affected(ev)) continue;
      if (ev.start >= boundary) {
        ev.start = new Date(ev.start.getTime() + DAY);
        ev.end   = new Date(ev.end.getTime()   + DAY);
      }
    }
  } else if (op === 'compress') {
    for (const ev of events) {
      if (!affected(ev)) continue;
      if (ev.start >= nextDay) {
        ev.start = new Date(ev.start.getTime() - DAY);
        ev.end   = new Date(ev.end.getTime()   - DAY);
      }
    }
  }

  save(); render();
}

// Close context menu on left-click outside it
document.addEventListener('click', e => {
  if (e.button !== 0) return;
  const menu = document.getElementById('day-ctx-menu');
  if (menu && menu.style.display !== 'none' && !menu.contains(e.target)) closeCtxMenu();
});

// ── INIT ───────────────────────────────────────────────────────────────────────
init();
</script>


<div id="day-ctx-menu" class="day-ctx-menu" style="display:none"></div>
<div class="undo-area" id="undo-area">
  <button id="btn-undo" onclick="undoLastAction()" title="Cancel last add or delete" disabled>↩ Cancel</button>
  <button id="btn-redo" onclick="redoLastAction()" title="Redo (undo the cancel)" disabled>↪ Redo</button>
</div>
</body>
</html>
