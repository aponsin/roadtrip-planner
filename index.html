<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Trip Planner</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --hdr: 60px;
  --sb-w: 228px;
  --lbl-w: 104px;
  --lane-h: 32px;
  --lane-gap: 4px;
  --date-row: 20px;
  --lane-top: 4px;
  --row-pad: 8px;
  --border: #e2e8f0;
  --bg: #f8fafc;
  --text: #0f172a;
  --muted: #64748b;
  --accent: #3b82f6;
}

/* ── RESET ──────────────────────────────── */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ── HEADER ─────────────────────────────── */
.hdr {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--hdr);
  background: #0f172a;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  z-index: 200;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}

.hdr-icon-btn {
  width: 32px; height: 32px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  border-radius: 7px;
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  flex-shrink: 0;
}
.hdr-icon-btn:hover { background: rgba(255,255,255,.2); }

.hdr-logo { font-size: 22px; }
.hdr-title { font-size: 15px; font-weight: 700; white-space: nowrap; }

.period-nav { display: flex; align-items: center; gap: 6px; margin-left: 4px; }
.period-lbl {
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,.75);
  min-width: 168px; text-align: center;
}

.hdr-date-pick {
  padding: 4px 8px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px;
  color: #fff; font-size: 12px;
  color-scheme: dark;
  cursor: pointer;
}

.hdr-spacer { flex: 1; }

.btn-new-event {
  background: #f59e0b; color: #1c1917;
  border: none; padding: 7px 14px;
  border-radius: 7px; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  transition: background .15s;
}
.btn-new-event:hover { background: #fbbf24; }
/* ── DAY CONTEXT MENU ───────────────────── */
#day-ctx-menu {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.13), 0 1px 4px rgba(0,0,0,.06);
  padding: 6px 0;
  min-width: 220px;
  font-family: inherit;
  overflow: hidden;
}
.ctx-section-label {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 14px 3px;
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: #94a3b8;
  user-select: none;
}
.ctx-dot {
  display: inline-block; width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}
.ctx-item {
  padding: 7px 14px;
  font-size: 13px; font-weight: 500; color: #1e293b;
  cursor: pointer; white-space: nowrap;
  transition: background .1s;
}
.ctx-item:hover { background: #f1f5f9; }
.ctx-item.ctx-sub { padding-left: 28px; color: #334155; font-size: 12px; }
.ctx-item.ctx-disabled { color: #94a3b8; cursor: default; font-style: italic; }
.ctx-item.ctx-disabled:hover { background: none; }
.ctx-divider { height: 1px; background: #f1f5f9; margin: 5px 0; }
.ctx-date-header {
  padding: 8px 14px 6px;
  font-size: 11px; font-weight: 700; color: #64748b;
  border-bottom: 1px solid #f1f5f9; margin-bottom: 3px;
}

/* ── UNDO / REDO FLOATING AREA ──────────── */
.undo-area {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; gap: 8px; z-index: 300;
}
.undo-area button {
  background: #fff; border: 1.5px solid #cbd5e1; color: #94a3b8;
  padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: not-allowed; white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  transition: all .15s;
}
.undo-area button.active {
  border-color: #64748b; color: #334155; cursor: pointer;
  box-shadow: 0 2px 10px rgba(0,0,0,.13);
}
.undo-area button.active:hover { background: #f8fafc; color: #0f172a; }

/* ── APP SHELL ──────────────────────────── */
.shell {
  position: fixed;
  top: var(--hdr); bottom: 0; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── FORM MODAL ─────────────────────────── */
.form-overlay {
  position: fixed; z-index: 200;
  background: rgba(15,23,42,.45);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 190px;
  opacity: 1; transition: opacity .18s ease;
}
.form-overlay.closed {
  opacity: 0; pointer-events: none;
}
.form-panel {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(15,23,42,.18);
  padding: 22px 24px 18px;
  width: min(640px, 96%);
  max-height: calc(100% - 60px);
  overflow-y: auto;
}

.form-head { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
.form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.ff { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 130px; }
.ff.wide { flex: 2; min-width: 180px; }
.ff label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.ff input, .ff select, .ff textarea {
  padding: 6px 8px; border: 1.5px solid var(--border);
  border-radius: 6px; font-size: 13px; color: var(--text);
  outline: none; transition: border-color .15s;
  background: #fff; font-family: inherit;
}
.ff input:focus, .ff select:focus, .ff textarea:focus { border-color: var(--accent); }
.ff textarea { resize: none; height: 32px; }

.form-actions { display: flex; gap: 8px; align-items: center; }
.btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
.btn-p { background: var(--accent); color: #fff; }
.btn-p:hover { background: #2563eb; }
.btn-g { background: #f1f5f9; color: #475569; border: 1.5px solid var(--border); }
.btn-g:hover { background: #e2e8f0; }
.btn-d { background: #fef2f2; color: #dc2626; border: 1.5px solid #fecaca; }
.btn-d:hover { background: #fee2e2; }

/* legend removed */

/* ── UNDO TOAST ─────────────────────────── */


/* ── MAIN ───────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ── SIDEBAR ────────────────────────────── */
.sb {
  width: var(--sb-w);
  flex-shrink: 0;
  background: #fff;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: width .2s ease;
}
.sb.closed { width: 0; border-right: none; }

.sb-hdr {
  padding: 13px 12px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  white-space: nowrap; overflow: hidden;
}
.sb-hdr-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }

.sb-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 10px;
  min-width: var(--sb-w);
}

.btn-new-trip {
  width: 100%; padding: 7px;
  border: 1.5px dashed var(--border);
  border-radius: 7px; background: none;
  cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted);
  transition: all .15s; margin-bottom: 10px;
  white-space: nowrap;
}
.btn-new-trip:hover { background: var(--bg); border-color: #94a3b8; color: var(--text); }
.btn-import-trip {
  width: 100%; padding: 6px;
  border: 1.5px dashed #94a3b8;
  border-radius: 7px; background: none;
  cursor: pointer; font-size: 11px; font-weight: 600; color: #94a3b8;
  transition: all .15s; margin-bottom: 10px;
  white-space: nowrap;
}
.btn-import-trip:hover { background: var(--bg); border-color: #64748b; color: var(--text); }

/* New trip form */
.ntf {
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 7px; padding: 9px; margin-bottom: 10px;
}
.ntf input[type=text] {
  width: 100%; padding: 5px 7px;
  border: 1.5px solid var(--border); border-radius: 5px;
  font-size: 12px; outline: none; font-family: inherit;
  margin-bottom: 7px;
}
.ntf input[type=text]:focus { border-color: var(--accent); }
.ntf-swatches { display: flex; gap: 5px; margin-bottom: 7px; flex-wrap: wrap; }
.ntf-swatch {
  width: 19px; height: 19px; border-radius: 4px;
  cursor: pointer; border: 2px solid transparent;
  transition: transform .1s;
}
.ntf-swatch:hover { transform: scale(1.15); }
.ntf-swatch.sel { border-color: #0f172a; }
.ntf-btns { display: flex; gap: 5px; }
.ntf-btns button {
  flex: 1; padding: 5px; border-radius: 5px;
  font-size: 11px; font-weight: 600; cursor: pointer; border: none;
}
.ntf-btns .save { background: var(--accent); color: #fff; }
.ntf-btns .cancel { background: #e2e8f0; color: #475569; }

/* Trip items */
.trip-item {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 7px; border-radius: 7px;
  transition: background .1s; margin-bottom: 2px;
  min-width: 0;
}
.trip-item:hover { background: var(--bg); }

.trip-vis {
  width: 17px; height: 17px; border-radius: 4px;
  border: 2px solid var(--border); background: #fff;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; transition: all .15s;
}
.trip-vis.on { background: currentColor; }
.trip-vis.on::after { content: '✓'; color: #fff; font-size: 9px; font-weight: 700; }

.trip-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.trip-name {
  flex: 1; font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0; cursor: default;
}
.trip-name-input {
  flex: 1; font-size: 12px; font-weight: 600;
  border: none; border-bottom: 1.5px solid var(--accent);
  outline: none; background: none; font-family: inherit;
  min-width: 0; padding: 0;
}
.trip-acts { display: flex; gap: 1px; flex-shrink: 0; }
.trip-act-btn {
  width: 20px; height: 20px; border-radius: 4px;
  background: none; border: none; cursor: pointer;
  font-size: 11px; color: #94a3b8;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.trip-act-btn:hover { background: #e2e8f0; color: var(--text); }
.trip-act-btn.del:hover { color: #dc2626; background: #fef2f2; }

/* ── TRIP VIZ MODAL ─────────────────────── */
#trip-viz-overlay {
  display: none; position: fixed; inset: 0; z-index: 8000;
  background: rgba(15,23,42,.55); backdrop-filter: blur(3px);
  align-items: center; justify-content: center;
}
#trip-viz-overlay.open { display: flex; }
#trip-viz-modal {
  background: #fff; border-radius: 16px;
  box-shadow: 0 24px 60px rgba(0,0,0,.22);
  width: min(720px, 94vw); max-height: 88vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.tviz-header {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tviz-color-bar {
  width: 5px; height: 36px; border-radius: 3px; flex-shrink: 0;
}
.tviz-title { font-size: 18px; font-weight: 700; color: #0f172a; flex: 1; }
.tviz-close {
  width: 28px; height: 28px; border-radius: 6px;
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: #94a3b8; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.tviz-close:hover { background: #f1f5f9; color: #0f172a; }
.tviz-stats {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: #f8fafc;
}
.tviz-stat {
  flex: 1; padding: 12px 16px; text-align: center;
  border-right: 1px solid var(--border);
}
.tviz-stat:last-child { border-right: none; }
.tviz-stat-val { font-size: 18px; font-weight: 700; color: #0f172a; white-space: nowrap; }
.tviz-stat-lbl { font-size: 11px; color: #64748b; margin-top: 2px; }
.tviz-map-btn {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  margin: 16px 24px 0; padding: 10px 16px; border-radius: 9px;
  background: #eff6ff; border: 1.5px solid #bfdbfe; color: #1d4ed8;
  font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
  transition: all .15s;
}
.tviz-map-btn:hover { background: #dbeafe; }
.tviz-body { overflow-y: auto; padding: 8px 24px 24px; flex: 1; }
.tviz-day {
  margin-top: 22px;
}
.tviz-day-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 8px; border-bottom: 2px solid #f1f5f9;
  margin-bottom: 10px;
}
.tviz-day-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: #0f172a; color: #fff;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tviz-day-label { font-size: 14px; font-weight: 700; color: #0f172a; }
.tviz-day-sublabel { font-size: 12px; color: #94a3b8; margin-left: auto; }
.tviz-ev {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 9px 12px; border-radius: 9px; margin-bottom: 0; margin-top: 6px;
  background: #f8fafc; border: 1px solid #f1f5f9;
}
.tviz-ev:hover { border-color: #e2e8f0; }
.tviz-ev-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.tviz-ev-body { flex: 1; min-width: 0; }
.tviz-ev-title { font-size: 13px; font-weight: 600; color: #0f172a; }
.tviz-ev-time { font-size: 11px; color: #64748b; margin-top: 1px; }
.tviz-ev-desc { font-size: 12px; color: #475569; margin-top: 4px; white-space: pre-wrap; }
.tviz-ev-drive {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; align-items: center;
}
.tviz-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
  background: #fef3c7; color: #92400e;
}
.tviz-chip.blue { background: #dbeafe; color: #1e40af; }
.tviz-ev-drive a {
  font-size: 11px; color: #2563eb; text-decoration: none; font-weight: 600;
}
.tviz-ev-drive a:hover { text-decoration: underline; }
.tviz-route {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: #475569;
  margin-top: 5px; flex-wrap: wrap;
}
.tviz-route-arrow { color: #94a3b8; }
.tviz-no-events { color: #94a3b8; font-size: 13px; font-style: italic; padding: 20px 0; text-align: center; }
.tviz-loc-link { color: #0f172a; font-weight: 600; text-decoration: none; }
.tviz-loc-link:hover { text-decoration: underline; color: #2563eb; }

.unassigned-row {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 7px 0; margin-top: 8px;
  border-top: 1px solid var(--border);
}

/* ── CAL AREA ───────────────────────────── */
.cal-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  background: var(--bg); min-width: 0;
}

/* sticky day header */
.cal-hdr {
  position: sticky; top: 0; z-index: 50;
  display: flex;
  background: #f0f4f8;
  border-bottom: 2px solid var(--border);
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}
.cal-corner { width: var(--lbl-w); flex-shrink: 0; border-right: 1px solid var(--border); }
.cal-days { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day {
  text-align: center; padding: 8px 4px;
  font-size: 10px; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: .8px;
  border-right: 1px solid var(--border);
}
.cal-day:last-child { border-right: none; }

/* Calendar card */
.cal-card {
  margin: 12px 14px 32px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

/* Week rows */
.week-row { display: flex; border-bottom: 1px solid var(--border); }
.week-row:last-child { border-bottom: none; }

.week-lbl {
  width: var(--lbl-w); flex-shrink: 0;
  padding: 5px 8px;
  font-size: 10px; font-weight: 600; color: var(--muted);
  border-right: 1px solid var(--border);
  background: #fafafa;
  display: flex; flex-direction: column; gap: 1px;
}
.week-num { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
.week-dates { line-height: 1.5; }

.timeline { flex: 1; position: relative; overflow: hidden; }

/* Day column backgrounds */
.dcol {
  position: absolute; top: 0; bottom: 0;
  pointer-events: none;
  border-right: 1px solid #f1f5f9;
}
.dcol.weekend  { background: rgba(241,245,249,.5); }

/* Now line */
.now-line {
  position: absolute; top: var(--date-row); bottom: 0;
  width: 2px; background: rgba(59,130,246,.5);
  z-index: 4; pointer-events: none;
}

/* Noon dotted lines */
.noon-line {
  position: absolute; top: var(--date-row); bottom: 0;
  width: 0;
  border-left: 1px dashed rgba(203,213,225,.45);
  pointer-events: none; z-index: 1;
}

/* Night overlay (9pm–7am) */
.night {
  position: absolute; top: 0; bottom: 0;
  background-image: radial-gradient(circle, rgba(100,116,139,.22) 1px, transparent 1px);
  background-size: 5px 5px;
  pointer-events: none; z-index: 2;
}

/* Trip bands */
.trip-band {
  position: absolute;
  pointer-events: all; z-index: 1;
  border-radius: 4px;
  cursor: default;
}

/* Date numbers */
.dnum {
  position: absolute; top: 3px;
  font-size: 9px; color: #94a3b8;
  pointer-events: none; user-select: none;
  text-align: center;
  width: calc(100% / 7);
}
.dnum.today { color: #3b82f6; font-weight: 700; }



/* Event bars */
.ev-bar {
  position: absolute;
  display: flex; flex-direction: column; justify-content: center;
  padding: 3px 8px; gap: 1px;
  cursor: grab; overflow: hidden;
  user-select: none; z-index: 3; min-width: 4px;
  transition: opacity .1s, box-shadow .1s;
}
.ev-bar:hover { opacity: .82; box-shadow: 0 2px 8px rgba(0,0,0,.14); z-index: 4; }
.ev-bar:active { cursor: grabbing; }
.ev-bar.dragging { opacity: .4; z-index: 5; cursor: grabbing; }
/* top row: icon + duration */
.ev-top { display: flex; align-items: center; justify-content: center; gap: 4px; }
.ev-icon { font-size: 11px; line-height: 1; flex-shrink: 0; }
.ev-dur  { font-size: 10px; font-weight: 500; opacity: .5; white-space: nowrap; }
/* bottom row: title + continuation arrows */
.ev-bot { display: flex; align-items: center; min-width: 0; }
.ev-cl, .ev-cr { font-size: 8px; opacity: .65; flex-shrink: 0; }
.ev-cl { margin-right: 3px; }
.ev-cr { margin-left: 3px; }
.ev-lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; font-weight: 600; min-width: 0; }

/* ── HOVER OVERLAY ───────────────────────── */
#ev-hover {
  position: fixed;
  display: none;
  align-items: center;
  padding: 0 8px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  border: 1.5px solid;
  border-radius: 5px;
  z-index: 150;
  pointer-events: none;
  box-shadow: 0 3px 10px rgba(0,0,0,.18);
  transition: none;
}

/* ── POPOVER ─────────────────────────────── */
.pop {
  position: fixed;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 15px;
  box-shadow: 0 8px 28px rgba(0,0,0,.12);
  z-index: 300; min-width: 230px; max-width: 288px;
}
.pop-x {
  position: absolute; top: 7px; right: 9px;
  background: none; border: none; font-size: 15px;
  cursor: pointer; color: #94a3b8; line-height: 1;
}
.pop-x:hover { color: var(--muted); }
.pop-cat-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.pop-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 700; border: 1px solid;
}
.pop-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.pop-time { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.pop-desc { font-size: 12px; color: #475569; margin-bottom: 10px; white-space: pre-wrap; }
.pop-driving { font-size: 12px; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 2px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
.pop-driving a { color: var(--accent); text-decoration: none; }
.pop-driving a:hover { text-decoration: underline; }
.pop-route-stat { color: var(--muted); }
.pop-actions { display: flex; gap: 7px; }

/* ── EVENT LINK INDICATORS ──────────────── */
.ev-bar.link-src::after {
  content: '⛓'; position: absolute; right: 3px; bottom: 2px;
  font-size: 8px; opacity: .65; pointer-events: none; line-height: 1;
}
.ev-bar.link-dst::before {
  content: '⛓'; position: absolute; left: 3px; bottom: 2px;
  font-size: 8px; opacity: .65; pointer-events: none; line-height: 1;
}
.link-badge {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 5px 9px; border-radius: 6px; font-size: 11px; font-weight: 600;
}
.link-badge.src { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
.link-badge.dst { background: #eff6ff; border: 1px solid #93c5fd; color: #1e3a8a; }
.link-badge button {
  background: none; border: 1px solid currentColor; border-radius: 4px;
  padding: 1px 6px; font-size: 10px; cursor: pointer; font-weight: 700;
  opacity: .7; margin-left: auto;
}
.link-badge button:hover { opacity: 1; background: rgba(0,0,0,.06); }

/* ── DRIVING FIELDS ──────────────────────── */
.addr-wrap { display: flex; gap: 5px; align-items: center; position: relative; }
.addr-link { font-size: 15px; text-decoration: none; flex-shrink: 0; opacity: .45; transition: opacity .15s; }
.addr-link:hover { opacity: 1; }
.addr-link.dim { opacity: .18; pointer-events: none; }

/* ── AUTOCOMPLETE ────────────────────────── */
.ac-dropdown {
  position: absolute; top: calc(100% + 3px); left: 0; right: 0;
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 6px 20px rgba(15,23,42,.12);
  z-index: 400; max-height: 220px; overflow-y: auto;
  list-style: none; margin: 0; padding: 4px 0;
}
.ac-item {
  padding: 8px 12px; cursor: pointer; font-size: 12px;
  display: flex; flex-direction: column; gap: 1px;
  border-bottom: 1px solid #f1f5f9;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: #f0f9ff; }
.ac-item-name { font-weight: 600; color: #1e293b; }
.ac-item-detail { color: #64748b; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.route-chip { display: inline-flex; align-items: center; gap: 7px; flex-wrap: wrap; padding: 5px 10px; background: #f8fafc; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; }
.route-chip a { color: var(--accent); text-decoration: none; font-weight: 600; }
.route-chip a:hover { text-decoration: underline; }
.pop-btn {
  flex: 1; padding: 6px; border-radius: 6px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f8fafc; color: #475569;
  transition: all .15s;
}
.pop-btn:hover { background: #e2e8f0; }
.pop-del { color: #dc2626; border-color: #fecaca; background: #fef2f2; }
.pop-del:hover { background: #fee2e2; }
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header class="hdr">
  <button class="hdr-icon-btn" onclick="toggleSidebar()" title="Toggle trips panel">☰</button>
  <span class="hdr-logo">🚐</span>
  <span class="hdr-title">Road Trip Planner</span>
  <div class="period-nav">
    <button class="hdr-icon-btn" onclick="navigate(-1)" title="Previous week">‹</button>
    <span class="period-lbl" id="period-lbl"></span>
    <button class="hdr-icon-btn" onclick="navigate(1)" title="Next week">›</button>
  </div>
  <input type="date" id="date-pick" class="hdr-date-pick" title="Jump to date" onchange="goToDate(this.value)">
  <div class="hdr-spacer"></div>
  <button class="btn-new-event" onclick="openForm()">＋ New Event</button>
</header>

<!-- ── SHELL ──────────────────────────────────────────────── -->
<div class="shell">

  <!-- Form Modal (injected into cal-area at runtime, see openForm) -->
  <div id="form-overlay" class="form-overlay closed" onclick="onOverlayClick(event)" style="display:none">
  <div id="form-panel" class="form-panel">
    <div class="form-head" id="form-head">New Event</div>
    <div class="form-row">
      <div class="ff wide">
        <label>Title</label>
        <input type="text" id="f-title" placeholder="Event title…" maxlength="80">
      </div>
      <div class="ff">
        <label>Category</label>
        <select id="f-cat" onchange="onCatChange()">
          <option value="driving">🚗 Driving</option>
          <option value="working">💼 Working</option>
          <option value="sightseeing">📸 Sightseeing</option>
          <option value="sleeping">🌙 Sleeping</option>
          <option value="transportation">⛵ Transportation</option>
          <option value="blocked">🔒 Blocked Time</option>
          <option value="misc">✨ Miscellaneous</option>
        </select>
      </div>
      <div class="ff">
        <label>Trip</label>
        <select id="f-trip"><option value="">— None —</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="ff">
        <label>Start</label>
        <div style="display:flex;gap:5px">
          <input type="date" id="f-start-date"
            style="flex:1;min-width:0;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;outline:none;font-family:inherit"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
          <select id="f-start-time"
            style="width:76px;padding:6px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:#fff;font-family:inherit"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
          </select>
        </div>
      </div>
      <div class="ff">
        <label>Duration</label>
        <div style="display:flex;gap:5px;align-items:center">
          <input type="number" id="f-dur-h" min="0" max="999" step="1" placeholder="0"
            style="width:60px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;outline:none;font-family:inherit"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
          <span style="font-size:12px;color:var(--muted);flex-shrink:0">h</span>
          <select id="f-dur-m"
            style="width:64px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:#fff;font-family:inherit"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
            <option value="0">00 m</option>
            <option value="15">15 m</option>
            <option value="30">30 m</option>
            <option value="45">45 m</option>
          </select>
        </div>
      </div>
      <div class="ff wide">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Optional notes…"></textarea>
      </div>
    </div>
    <!-- Sleeping-only fields -->
    <div id="sleeping-fields" class="form-row" style="display:none">
      <div class="ff" style="flex:3;min-width:200px">
        <label>Location (campsite, hotel, …)</label>
        <div class="addr-wrap">
          <input type="text" id="f-sleep-addr" placeholder="Name or address…" oninput="updateSleepLink()">
          <a id="lnk-sleep" class="addr-link dim" href="#" target="_blank" title="Open in Google Maps">📍</a>
        </div>
      </div>

    <!-- Driving-only fields -->
    <div id="driving-fields" class="form-row" style="display:none">
      <div class="ff" style="flex:2;min-width:160px">
        <label>Departure</label>
        <div class="addr-wrap">
          <input type="text" id="f-departure" placeholder="City or address…" oninput="updateAddrLink('departure');markRouteStale()">
          <a id="lnk-departure" class="addr-link dim" href="#" target="_blank" title="Open in Google Maps">📍</a>
        </div>
      </div>
      <div class="ff" style="flex:2;min-width:160px">
        <label>Arrival</label>
        <div class="addr-wrap">
          <input type="text" id="f-arrival" placeholder="City or address…" oninput="updateAddrLink('arrival');markRouteStale()">
          <a id="lnk-arrival" class="addr-link dim" href="#" target="_blank" title="Open in Google Maps">📍</a>
        </div>
      </div>
      <div class="ff" style="min-width:140px">
        <label>Distance &amp; drive time</label>
        <div id="route-result"><button class="btn btn-g" onclick="fetchRoute()" style="padding:5px 10px;font-size:12px">↗ Get route</button></div>
      </div>
      <!-- Link status (full-width, shown when linked) -->
      <div id="link-status-row" style="width:100%;display:none;padding-top:2px">
        <div id="link-src-badge"  class="link-badge src" style="display:none"></div>
        <div id="link-dst-badge"  class="link-badge dst" style="display:none"></div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-p" onclick="submitForm()">Save Event</button>
      <button class="btn btn-g" onclick="closeForm()">Cancel</button>
      <button class="btn btn-d" id="btn-del" onclick="deleteEditingEvent()" style="display:none">Delete</button>
    </div>
  </div><!-- /form-panel -->
  </div><!-- /form-overlay -->

  <!-- Main layout -->
  <div class="main">

    <!-- Sidebar -->
    <div id="sb" class="sb">
      <div class="sb-hdr"><div class="sb-hdr-title">Trips</div></div>
      <div class="sb-body" id="sb-body"></div>
    </div>

    <!-- Calendar area -->
    <div class="cal-area" id="cal-area">
      <div class="cal-hdr">
        <div class="cal-corner"></div>
        <div class="cal-days">
          <div class="cal-day">Mon</div>
          <div class="cal-day">Tue</div>
          <div class="cal-day">Wed</div>
          <div class="cal-day">Thu</div>

</div><!-- /shell -->

<!-- Popover -->
<div id="pop" class="pop" style="display:none">
  <button class="pop-x" onclick="closePop()">✕</button>
  <div id="pop-cat-row" class="pop-cat-row"></div>

<script>
'use strict';

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const CATS = {
  driving:        { label:'Driving',        emoji:'🚗', color:'#92400e', bg:'#fef3c7', border:'#d97706' },
  working:        { label:'Working',        emoji:'💼', color:'#1e3a8a', bg:'#dbeafe', border:'#3b82f6' },
  sightseeing:    { label:'Sightseeing',    emoji:'📸', color:'#064e3b', bg:'#d1fae5', border:'#10b981' },
  sleeping:       { label:'Sleeping',       emoji:'🌙', color:'#4c1d95', bg:'#ede9fe', border:'#8b5cf6' },
  transportation: { label:'Transportation', emoji:'⛵', color:'#0c4a6e', bg:'#e0f2fe', border:'#0ea5e9' },
  blocked:        { label:'Blocked Time',   emoji:'🔒', color:'#1f2937', bg:'#e5e7eb', border:'#6b7280' },
  misc:           { label:'Misc.',          emoji:'✨', color:'#831843', bg:'#fce7f3', border:'#ec4899' },
};

const TRIP_COLORS = [
  '#e11d48','#2563eb','#16a34a','#d97706',
  '#7c3aed','#0891b2','#db2777','#65a30d',
];

const WK  = 7 * 24 * 60 * 60 * 1000;
const DAY = 24 * 60 * 60 * 1000;
const LANE_H    = 48;
const LANE_GAP  = 6;
const DATE_ROW  = 22;
const LANE_TOP  = 6;
const ROW_PAD   = 10;

// ── STATE ──────────────────────────────────────────────────────────────────────
let trips        = [];
let events       = [];
let viewStart    = null;
let unassVis     = true;
let nextTripId   = 1;
let nextEvId     = 1;
let editingId    = null;
let popEvId      = null;
let dragState    = null;
let sbOpen       = true;
let renamingId   = null;
let newTripForm  = false;
let newTripColor = TRIP_COLORS[0];
let newTripName  = '';
let lastTripId   = null;
let routeData    = null; // { distanceM, drivingSeconds } after a successful fetch

// ── BOOT ───────────────────────────────────────────────────────────────────────
function init() {
  loadState();
  if (!viewStart) viewStart = monday(new Date());
  buildTimeSelect();
  renderSidebar();
  render();
  window.addEventListener('resize', () => {
    if (!document.getElementById('form-overlay').classList.contains('closed')) positionOverlay();
  });

  // Scroll wheel on calendar → navigate weeks
  document.getElementById('cal-area').addEventListener('wheel', e => {
    e.preventDefault();
    navigate(e.deltaY > 0 ? 1 : -1);
  }, { passive: false });

  // Right-click inside calendar → day operation menu
  document.addEventListener('contextmenu', function(e) {
    if (!e.target.closest('#cal-area')) return; // ignore outside calendar
    e.preventDefault();
    const d = dayUnderMouse(e);
    // Detect trip from band or event bar
    const band = e.target.closest('.trip-band');
    const bar  = e.target.closest('.ev-bar');
    let tripId;
    if (band) {
      const raw = band.dataset.tripId;
      tripId = raw !== '' ? parseInt(raw) : null;
    } else if (bar) {
      const evId = parseInt(bar.dataset.id);
      const ev = events.find(ev => ev.id === evId);
      tripId = ev ? ev.tripId : undefined;
    }

    if (tripId === undefined || !d) {
      // Nothing actionable — show hint
      const menu = document.getElementById('day-ctx-menu');
      menu.innerHTML = '<div class="ctx-item ctx-disabled">Right-click a trip band or event to extend or compress it</div>';
      const mw = 300;
      const mx = (e.clientX + 4 + mw > window.innerWidth) ? e.clientX - mw - 4 : e.clientX + 4;
      menu.style.cssText = `display:block; position:fixed; z-index:9999; left:${mx}px; top:${e.clientY+4}px; min-width:${mw}px;`;
      return;
    }
    const iso = d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
    showDayMenu(e, iso, tripId);
  });

  document.addEventListener('click', onDocClick);
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('wheel', hideBarHover, { passive: true });
}

// ── PERSISTENCE ────────────────────────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('rtp4', JSON.stringify({
      trips, unassVis, nextTripId, nextEvId,
      viewStart: viewStart.getTime(),
      events: events.map(e => ({ ...e, start: e.start.getTime(), end: e.end.getTime() })),
    }));
  } catch (_) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('rtp4');
    if (!raw) return;
    const d = JSON.parse(raw);
    trips      = d.trips      || [];
    unassVis   = d.unassVis  !== false;
    nextTripId = d.nextTripId || 1;
    nextEvId   = d.nextEvId   || 1;
    viewStart  = d.viewStart  ? new Date(d.viewStart) : null;
    events     = (d.events || []).map(e => ({ ...e, start: new Date(e.start), end: new Date(e.end) }));
    migrateLinks();
  } catch (_) {}
}

// Auto-link consecutive driving events within the same trip that have no link yet.
// Runs once on load so pre-existing events get connected automatically.
function migrateLinks() {
  const tripIds = [...new Set(events.filter(e => e.tripId != null && e.category === 'driving').map(e => e.tripId))];
  let changed = false;
  for (const tid of tripIds) {
    const drivs = events
      .filter(e => e.tripId === tid && e.category === 'driving')
      .sort((a, b) => a.start - b.start);
    for (let i = 0; i < drivs.length - 1; i++) {
      const a = drivs[i], b = drivs[i + 1];
      // Only auto-link if a has no explicit link yet (undefined = never saved with this feature)
      if (a.linkedNextId === undefined) {
        a.linkedNextId = null; // normalise first
        if (a.arrival) {
          // Link if b isn't already a destination for someone else
          const alreadyLinked = events.some(e => e.linkedNextId === b.id);
          if (!alreadyLinked) {
            a.linkedNextId = b.id;
            if (!b.departure) b.departure = a.arrival;
            changed = true;
          }
        }
      }
      // Normalise any remaining undefined linkedNextId
      if (a.linkedNextId === undefined) a.linkedNextId = null;
    }
    // Normalise last event
    if (drivs.length) {
      const last = drivs[drivs.length - 1];
      if (last.linkedNextId === undefined) last.linkedNextId = null;
    }
  }
  // Normalise non-driving events too
  for (const e of events) {
    if (e.linkedNextId === undefined) e.linkedNextId = null;
  }
  if (changed) save();
}

// ── DATE UTILS ─────────────────────────────────────────────────────────────────
function monday(d) {
  const c = new Date(d); c.setHours(0,0,0,0);
  const day = c.getDay();
  c.setDate(c.getDate() + (day === 0 ? -6 : 1 - day));
  return c;
}
function addDays(d, n)  { return new Date(d.getTime() + n * DAY); }
function addWeeks(d, n) { return new Date(d.getTime() + n * WK);  }

function fmt(d) {
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function fmtDT(d) {
  return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
}
function fmtDur(ms) {
  const m = Math.round(ms / 60000);
  const h = Math.floor(m / 60), r = m % 60;
  return h === 0 ? `${r}m` : r === 0 ? `${h}h` : `${h}h ${r}m`;
}
function toInp(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fromInp(s) {
  if (!s) return null;
  const [dt, tm] = s.split('T');
  const [y,mo,da] = dt.split('-').map(Number);
  const [h,mi]    = tm.split(':').map(Number);
  return new Date(y, mo-1, da, h, mi);
}
function snap15(d) {
  const ms = 15 * 60 * 1000;
  return new Date(Math.round(d.getTime() / ms) * ms);
}

function buildTimeSelect() {
  const sel = document.getElementById('f-start-time');
  if (!sel || sel.options.length > 0) return;
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 15) {
      const val = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      sel.appendChild(Object.assign(document.createElement('option'), { value: val, textContent: val }));
    }
  }
}

function setStartFields(d) {
  const snapped = snap15(d);
  const p = n => String(n).padStart(2,'0');
  document.getElementById('f-start-date').value = `${snapped.getFullYear()}-${p(snapped.getMonth()+1)}-${p(snapped.getDate())}`;
  document.getElementById('f-start-time').value = `${p(snapped.getHours())}:${p(snapped.getMinutes())}`;
}

function getStartFromFields() {
  const dateStr = document.getElementById('f-start-date').value;
  const timeStr = document.getElementById('f-start-time').value;
  if (!dateStr || !timeStr) return null;
  const [y,mo,da] = dateStr.split('-').map(Number);
  const [h,mi]    = timeStr.split(':').map(Number);
  return new Date(y, mo-1, da, h, mi);
}
function isToday(d) {
  const n = new Date();
  return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────────
function navigate(weeks) { viewStart = addWeeks(viewStart, weeks); render(); }
function goToDate(s) { if (s) { viewStart = monday(new Date(s + 'T00:00:00')); render(); } }

// ── SIDEBAR ─────────────────────────────────────────────────────────────────────
function toggleSidebar() {
  sbOpen = !sbOpen;
  document.getElementById('sb').classList.toggle('closed', !sbOpen);
}

function renderSidebar() {
  const body = document.getElementById('sb-body');
  if (!body) return;

  // Preserve typed name across re-renders (e.g. color swatch clicks)
  if (newTripForm) {
    const inp = document.getElementById('ntf-name');
    if (inp) newTripName = inp.value;
  }

  // ── New trip form ──
  let ntfHTML = '';
  if (newTripForm) {
    const swatches = TRIP_COLORS.map(c =>
      `<div class="ntf-swatch${c===newTripColor?' sel':''}" style="background:${c}"
        onclick="newTripColor='${c}';renderSidebar()"></div>`
    ).join('');
    ntfHTML = `
      <div class="ntf">
        <input id="ntf-name" type="text" placeholder="Trip name…" maxlength="40"
          value="${esc(newTripName)}"
          oninput="newTripName=this.value"
          onkeydown="ntfKey(event)">
        <div class="ntf-swatches">${swatches}</div>
        <div class="ntf-btns">
          <button class="save"   onclick="createTrip()">Create</button>
          <button class="cancel" onclick="cancelNewTrip()">Cancel</button>
        </div>
      </div>`;
  }

  // ── Trip list ──
  const tripRows = trips.map(t => {
    const vis = t.visible !== false;
    const nameHTML = renamingId === t.id
      ? `<input class="trip-name-input" id="rn-${t.id}" type="text" value="${esc(t.name)}"
           maxlength="40"
           onblur="finishRename(${t.id})"
           onkeydown="rnKey(event,${t.id})">`
      : `<span class="trip-name" title="${esc(t.name)}">${esc(t.name)}</span>`;

    return `
      <div class="trip-item">
        <div class="trip-vis ${vis?'on':''}" style="color:${t.color}"
          onclick="toggleTripVis(${t.id})" title="${vis?'Hide':'Show'} events"></div>
        <div class="trip-dot" style="background:${t.color}"></div>
        ${nameHTML}
        <div class="trip-acts">
          <button class="trip-act-btn" onclick="openTripViz(${t.id})" title="Trip summary"><svg width="13" height="10" viewBox="0 0 13 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 5C1 5 3.2 1.5 6.5 1.5C9.8 1.5 12 5 12 5C12 5 9.8 8.5 6.5 8.5C3.2 8.5 1 5 1 5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="6.5" cy="5" r="1.6" fill="currentColor"/></svg></button>
          <button class="trip-act-btn" onclick="exportTrip(${t.id})" title="Export to CSV">⬇</button>
          <button class="trip-act-btn" onclick="startRename(${t.id})" title="Rename">✏</button>
          <button class="trip-act-btn del" onclick="deleteTrip(${t.id})" title="Delete">✕</button>
        </div>
      </div>`;
  }).join('');

  body.innerHTML = `
    <button class="btn-new-trip" onclick="showNewTripForm()">＋ New Trip</button>
    <button class="btn-import-trip" onclick="importTrip()">⬆ Import Trip from CSV</button>
    ${ntfHTML}
    ${tripRows}`;

  if (newTripForm) setTimeout(() => document.getElementById('ntf-name')?.focus(), 30);
  if (renamingId !== null) setTimeout(() => document.getElementById(`rn-${renamingId}`)?.focus(), 30);
}

// trip actions
function showNewTripForm() {
  newTripForm  = true;
  newTripName  = '';
  newTripColor = TRIP_COLORS[trips.length % TRIP_COLORS.length];
  renderSidebar();
}
function cancelNewTrip() { newTripForm = false; newTripName = ''; renderSidebar(); }
function ntfKey(e)   { if (e.key==='Enter') createTrip(); if (e.key==='Escape') cancelNewTrip(); }

function createTrip() {
  const name = (document.getElementById('ntf-name')?.value || newTripName || '').trim();
  if (!name) return;
  trips.push({ id: nextTripId++, name, color: newTripColor, visible: true });
  newTripForm = false; newTripName = '';
  save(); renderSidebar(); refreshTripSelect();
}

function deleteTrip(id) {
  const count = events.filter(e => e.tripId === id).length;
  const msg = count > 0
    ? `Delete this trip and its ${count} event(s)?`
    : 'Delete this trip?';
  if (!confirm(msg)) return;
  trips  = trips.filter(t => t.id !== id);
  events = events.filter(e => e.tripId !== id);
  save(); renderSidebar(); refreshTripSelect(); render();
}

function startRename(id)  { renamingId = id; renderSidebar(); }
function rnKey(e, id)     { if (e.key==='Enter'||e.key==='Escape') finishRename(id); }
function finishRename(id) {
  const inp = document.getElementById(`rn-${id}`);
  const name = (inp?.value || '').trim();
  if (name) { const t = trips.find(t=>t.id===id); if (t) t.name = name; }
  renamingId = null;
  save(); renderSidebar(); refreshTripSelect();
}

function toggleTripVis(id) {
  const t = trips.find(t=>t.id===id);
  if (t) t.visible = !t.visible;
  save(); renderSidebar(); render();
}
function toggleUnassVis() {
  unassVis = !unassVis;
  save(); renderSidebar(); render();
}

// ── EXPORT / IMPORT ────────────────────────────────────────────────────────────
const CSV_HEADERS = [
  'trip_name','trip_color',
  'title','category','start','end','description',
  'departure','arrival','distance_m','driving_seconds','time_on_road_h',
  'sleeping_address','event_ref','linked_next_ref',
];

function csvCell(val) {
  const s = val == null ? '' : String(val);
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? '"' + s.replace(/"/g, '""') + '"'
    : s;
}

// ── TRIP VISUALIZATION ─────────────────────────────────────────────────────────
function openTripViz(tripId) {
  const trip = trips.find(t => t.id === tripId);
  if (!trip) return;
  const tripEvs = events.filter(e => e.tripId === tripId)
                        .sort((a, b) => a.start - b.start);
  if (!tripEvs.length) { alert('This trip has no events to display.'); return; }

  // ── helpers ──
  const fmtDate      = d => d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const fmtDateShort = d => d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
  const fmtTime      = d => d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  const fmtDist      = m => `${(m / 1609.34).toFixed(0)} mi · ${(m / 1000).toFixed(0)} km`;
  const fmtDriveTime = s => {
    const h = Math.floor(s / 3600), m = Math.round((s % 3600) / 60);
    return h > 0 ? `${h}h ${m > 0 ? m + 'min' : ''}`.trim() : `${m}min`;
  };
  // Always use local-time day key to avoid UTC timezone shift bugs
  const isoDay    = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const mapsSearch = q => `https://www.google.com/maps/search/${encodeURIComponent(q)}`;
  const mapsDir    = (a, b) => `https://www.google.com/maps/dir/${encodeURIComponent(a)}/${encodeURIComponent(b)}`;

  // ── aggregate stats ──
  let totalDistM = 0, totalDriveSec = 0;
  for (const ev of tripEvs) {
    if (ev.category === 'driving') {
      if (ev.distanceM)      totalDistM    += ev.distanceM;
      if (ev.drivingSeconds) totalDriveSec += ev.drivingSeconds;
    }
  }
  const firstDay  = new Date(tripEvs[0].start); firstDay.setHours(0,0,0,0);
  const lastDay   = new Date(tripEvs[tripEvs.length-1].end);
  const totalDays = Math.ceil((lastDay - firstDay) / (24*60*60*1000));

  // ── Google Maps multi-stop URL ──
  const waypoints = [];
  for (const ev of tripEvs) {
    if (ev.category === 'driving') {
      if (ev.departure && (waypoints.length === 0 || waypoints[waypoints.length-1] !== ev.departure))
        waypoints.push(ev.departure);
      if (ev.arrival) waypoints.push(ev.arrival);
    }
  }
  const uniqueWp = waypoints.filter((w, i) => i === 0 || w !== waypoints[i-1]);
  const mapsUrl  = uniqueWp.length >= 2
    ? 'https://www.google.com/maps/dir/' + uniqueWp.map(w => encodeURIComponent(w)).join('/')
    : null;

  // ── group events by day — multi-day events appear on each day they span ──
  // entry: { ev, isStart, isEnd }
  const byDay = new Map();
  for (const ev of tripEvs) {
    const startKey = isoDay(ev.start);
    // Use end - 1ms so an event ending exactly at midnight doesn't bleed into the next day
    const endMoment = new Date(ev.end.getTime() - 1);
    const endKey    = isoDay(endMoment);

    // Walk day by day from startKey to endKey (both local-time)
    const cursor = new Date(ev.start.getFullYear(), ev.start.getMonth(), ev.start.getDate());
    const stop   = new Date(endMoment.getFullYear(), endMoment.getMonth(), endMoment.getDate());
    while (cursor <= stop) {
      const key     = isoDay(cursor);
      const isStart = key === startKey;
      const isEnd   = key === endKey;
      if (!byDay.has(key)) byDay.set(key, []);
      byDay.get(key).push({ ev, isStart, isEnd });
      cursor.setDate(cursor.getDate() + 1);
    }
  }

  // ── render stats bar ──
  document.getElementById('tviz-stats').innerHTML = [
    { val: totalDays + (totalDays === 1 ? ' day' : ' days'), lbl: 'Duration' },
    { val: tripEvs.length,                                    lbl: 'Events' },
    totalDistM    ? { val: fmtDist(totalDistM),          lbl: 'Total driving distance' } : null,
    totalDriveSec ? { val: fmtDriveTime(totalDriveSec), lbl: 'Time on the road' }       : null,
  ].filter(Boolean).map(s =>
    `<div class="tviz-stat"><div class="tviz-stat-val">${s.val}</div><div class="tviz-stat-lbl">${s.lbl}</div></div>`
  ).join('');

  // ── render days ──
  let bodyHtml = '';
  if (mapsUrl) {
    bodyHtml += `<a class="tviz-map-btn" href="${mapsUrl}" target="_blank">🗺️ Open full route in Google Maps</a>`;
  }

  let dayNum = 0;
  for (const [dayKey, dayEntries] of [...byDay.entries()].sort()) {
    dayNum++;
    const dayDate  = new Date(dayKey + 'T12:00:00');
    const dayDistM = dayEntries
      .filter(({ ev, isStart }) => ev.category === 'driving' && ev.distanceM && isStart)
      .reduce((s, { ev }) => s + ev.distanceM, 0);

    bodyHtml += `<div class="tviz-day">
      <div class="tviz-day-header">
        <div class="tviz-day-num" style="background:${trip.color}">${dayNum}</div>
        <div class="tviz-day-label">${fmtDate(dayDate)}</div>
        ${dayDistM ? `<div class="tviz-day-sublabel">🚗 ${fmtDist(dayDistM)}</div>` : ''}
      </div>`;

    for (const { ev, isStart, isEnd } of dayEntries) {
      const cat        = CATS[ev.category] || CATS.misc;
      const isMultiDay = !isStart || !isEnd;

      // Card style: gradient fades for multi-day events
      // Fade direction: start-day fades out at bottom (→ white), end-day fades in at top (white →)
      // Middle days: both ends fade
      let cardStyle = 'background:#f8fafc;'; // default single-day
      if (isMultiDay) {
        if (isStart && !isEnd) {
          // First day: solid top, fades to white at bottom
          cardStyle = 'background:linear-gradient(to bottom,#f8fafc 60%,#ffffff);border-bottom:none;border-radius:8px 8px 0 0;';
        } else if (!isStart && isEnd) {
          // Last day: white at top, solid bottom
          cardStyle = 'background:linear-gradient(to bottom,#ffffff,#f8fafc 40%);border-top:none;border-radius:0 0 8px 8px;';
        } else {
          // Middle day: white both ends
          cardStyle = 'background:linear-gradient(to bottom,#ffffff,#f8fafc 30%,#f8fafc 70%,#ffffff);border-top:none;border-bottom:none;border-radius:0;';
        }
      }

      // Time / continuation label
      let timeStr;
      if (isStart && isEnd) {
        timeStr = `${fmtTime(ev.start)} – ${fmtTime(ev.end)}`;
      } else if (isStart) {
        timeStr = `Starts ${fmtTime(ev.start)} &nbsp;↓ continues…`;
      } else if (isEnd) {
        timeStr = `↑ Continued from ${fmtDateShort(ev.start)} · ends ${fmtTime(ev.end)}`;
      } else {
        timeStr = `↑ Continues all day · from ${fmtDateShort(ev.start)}`;
      }

      let evExtra = '';

      // ── Driving ──
      if (ev.category === 'driving' && (ev.departure || ev.arrival)) {
        evExtra += `<div class="tviz-route">`;
        if (ev.departure) evExtra += `<a href="${mapsSearch(ev.departure)}" target="_blank" class="tviz-loc-link">${esc(ev.departure)}</a>`;
        if (ev.departure && ev.arrival) evExtra += `<span class="tviz-route-arrow">→</span>`;
        if (ev.arrival)   evExtra += `<a href="${mapsSearch(ev.arrival)}"   target="_blank" class="tviz-loc-link">${esc(ev.arrival)}</a>`;
        evExtra += `</div><div class="tviz-ev-drive">`;
        if (ev.distanceM)      evExtra += `<span class="tviz-chip">📏 ${fmtDist(ev.distanceM)}</span>`;
        if (ev.drivingSeconds) evExtra += `<span class="tviz-chip">⏱ ${fmtDriveTime(ev.drivingSeconds)} on road</span>`;
        if (ev.departure && ev.arrival)
          evExtra += `<a href="${mapsDir(ev.departure, ev.arrival)}" target="_blank">🗺 View leg</a>`;
        evExtra += `</div>`;
      }

      // ── Sleeping ──
      if (ev.category === 'sleeping' && ev.sleepingAddress) {
        evExtra += `<div class="tviz-ev-drive">
          <span class="tviz-chip blue">📍 ${esc(ev.sleepingAddress)}</span>
          <a href="${mapsSearch(ev.sleepingAddress)}" target="_blank">View on map</a>
        </div>`;
      }

      // ── Sightseeing / transportation → search link from title ──
      if ((ev.category === 'sightseeing' || ev.category === 'transportation') && ev.title) {
        evExtra += `<div class="tviz-ev-drive"><a href="${mapsSearch(ev.title)}" target="_blank">📍 Find on map</a></div>`;
      }

      // ── Description (only on the start day) ──
      if (ev.description && isStart) {
        evExtra += `<div class="tviz-ev-desc">${esc(ev.description)}</div>`;
      }

      bodyHtml += `<div class="tviz-ev" style="${cardStyle}">
        <div class="tviz-ev-icon">${isStart ? cat.emoji : '↕'}</div>
        <div class="tviz-ev-body">
          <div class="tviz-ev-title">${esc(ev.title)}</div>
          <div class="tviz-ev-time">${timeStr} &nbsp;·&nbsp; ${cat.label}</div>
          ${evExtra}
        </div>
      </div>`;
    }
    bodyHtml += `</div>`;
  }

  // ── populate & show ──
  document.getElementById('tviz-color-bar').style.background = trip.color;
  document.getElementById('tviz-title').textContent = trip.name;
  document.getElementById('tviz-body').innerHTML = bodyHtml;
  document.getElementById('trip-viz-overlay').classList.add('open');
  document.getElementById('tviz-body').scrollTop = 0;
}

function closeTripViz(e) {
  if (e && e.target !== document.getElementById('trip-viz-overlay')) return;
  document.getElementById('trip-viz-overlay').classList.remove('open');
}

function exportTrip(tripId) {
  const trip = trips.find(t => t.id === tripId);
  if (!trip) return;
  const tripEvs = events.filter(e => e.tripId === tripId);
  if (!tripEvs.length) { alert('This trip has no events to export.'); return; }

  // Build a stable per-export ref map so linkedNextId can survive import
  const refMap = {};
  tripEvs.forEach((ev, i) => refMap[ev.id] = i + 1);

  const rows = tripEvs.map(ev => [
    trip.name, trip.color,
    ev.title, ev.category,
    ev.start.toISOString(), ev.end.toISOString(),
    ev.description || '',
    ev.departure || '', ev.arrival || '',
    ev.distanceM ?? '', ev.drivingSeconds ?? '', ev.timeOnRoadH ?? '',
    ev.sleepingAddress || '',
    refMap[ev.id],                                           // event_ref (row index)
    ev.linkedNextId != null ? (refMap[ev.linkedNextId] ?? '') : '',  // linked_next_ref
  ].map(csvCell).join(','));

  const csv  = [CSV_HEADERS.join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: `${trip.name.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'_') || 'trip'}.csv` });
  a.click();
  URL.revokeObjectURL(url);
}

function importTrip() {
  const inp = Object.assign(document.createElement('input'), { type: 'file', accept: '.csv' });
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => parseImportCSV(evt.target.result);
    reader.readAsText(file, 'utf-8');
  };
  inp.click();
}

function parseCSVRow(line) {
  const cells = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { cells.push(cur); cur = ''; }
      else cur += c;
    }
  }
  cells.push(cur);
  return cells;
}

function parseImportCSV(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split('\n');
  if (lines.length < 2) { alert('Invalid CSV — file appears empty.'); return; }

  const headers = parseCSVRow(lines[0]).map(h => h.trim());
  const idx = {};
  headers.forEach((h, i) => idx[h] = i);

  const required = ['trip_name','title','start','end'];
  if (required.some(k => idx[k] === undefined)) {
    alert('Invalid CSV — missing required columns: ' + required.filter(k => idx[k] === undefined).join(', '));
    return;
  }

  const dataRows = lines.slice(1).filter(l => l.trim()).map(parseCSVRow);
  if (!dataRows.length) { alert('No event rows found in CSV.'); return; }

  const get = (row, key) => (idx[key] !== undefined ? (row[idx[key]] || '') : '');

  // Trip metadata from first row
  const tripName  = get(dataRows[0], 'trip_name') || 'Imported Trip';
  const tripColor = get(dataRows[0], 'trip_color') || TRIP_COLORS[trips.length % TRIP_COLORS.length];
  const newTripId = nextTripId++;
  trips.push({ id: newTripId, name: tripName, color: tripColor, visible: true });

  let imported = 0, skipped = 0;
  const refToId = {};    // event_ref string → new event id
  const linkQueue = [];  // { evId, linkedRef } to resolve after all events created
  const hasLinkCol = dataRows.length > 0 && get(dataRows[0], 'linked_next_ref') !== undefined;

  for (const row of dataRows) {
    const startStr = get(row, 'start'), endStr = get(row, 'end');
    // Safari requires ISO 8601 with 'T' — normalize "YYYY-MM-DD HH:MM" → "YYYY-MM-DDTHH:MM"
    const parseDate = s => new Date(s.trim().replace(' ', 'T'));
    const start = parseDate(startStr), end = parseDate(endStr);
    if (!startStr || !endStr || isNaN(start) || isNaN(end)) { skipped++; continue; }

    const num = (key) => { const v = get(row, key); return v !== '' ? parseFloat(v) : null; };
    const newId = nextEvId++;
    const ref = get(row, 'event_ref');
    if (ref) refToId[ref] = newId;

    // Queue link restoration if this row has a linked_next_ref value
    const lnkRef = get(row, 'linked_next_ref');
    if (lnkRef) linkQueue.push({ evId: newId, linkedRef: lnkRef });

    events.push({
      id: newId, tripId: newTripId,
      title:          get(row, 'title')    || 'Untitled',
      category:       get(row, 'category') || 'misc',
      start, end,
      description:    get(row, 'description'),
      departure:      get(row, 'departure'),
      arrival:        get(row, 'arrival'),
      distanceM:      num('distance_m'),
      drivingSeconds: num('driving_seconds'),
      timeOnRoadH:    num('time_on_road_h'),
      sleepingAddress: get(row, 'sleeping_address'),
      linkedNextId:   null,
    });
    imported++;
  }

  // Restore links from explicit linked_next_ref column (preserves disconnects)
  if (hasLinkCol) {
    for (const { evId, linkedRef } of linkQueue) {
      const targetId = refToId[linkedRef];
      if (targetId) {
        const ev = events.find(e => e.id === evId);
        if (ev) ev.linkedNextId = targetId;
      }
    }
  } else {
    // Legacy CSV (no linked_next_ref): fall back to heuristic auto-linking
    const tripDrivingEvs = events
      .filter(e => e.tripId === newTripId && e.category === 'driving')
      .sort((a, b) => a.start - b.start);
    for (let i = 0; i < tripDrivingEvs.length - 1; i++) {
      const a = tripDrivingEvs[i], b = tripDrivingEvs[i + 1];
      if (a.arrival && (!b.departure || b.departure === a.arrival)) {
        a.linkedNextId = b.id;
        b.departure    = a.arrival;
      }
    }
  }

  save(); renderSidebar(); render();
  alert(`Imported "${tripName}" — ${imported} event(s) added${skipped ? `, ${skipped} row(s) skipped` : ''}.`);
}

// ── LEGEND ─────────────────────────────────────────────────────────────────────
function renderLegend() {
  document.getElementById('legend').innerHTML = Object.values(CATS).map(c =>
    `<div class="leg-item">
       <div class="leg-dot" style="background:${c.border}"></div>
       ${c.emoji} ${c.label}
     </div>`
  ).join('');
}

// ── EVENT VISIBILITY ───────────────────────────────────────────────────────────
function evVisible(ev) {
  if (ev.tripId == null) return unassVis;
  const t = trips.find(t=>t.id===ev.tripId);
  return t ? t.visible !== false : unassVis;
}

// ── SEGMENTS ──────────────────────────────────────────────────────────────────
function segments(ev) {
  const segs = [];
  for (let w = 0; w < 10; w++) {
    const ws = new Date(viewStart.getTime() + w * WK);
    const we = new Date(ws.getTime() + WK);
    if (ev.start >= we || ev.end <= ws) continue;
    const ss = Math.max(ev.start.getTime(), ws.getTime());
    const se = Math.min(ev.end.getTime(),   we.getTime());
    segs.push({
      w,
      left:    (ss - ws.getTime()) / WK * 100,
      width:   (se - ss)           / WK * 100,
      isStart: ev.start.getTime() >= ws.getTime(),
      isEnd:   ev.end.getTime()   <= we.getTime(),
    });
  }
  return segs;
}

// ── LANE ASSIGNMENT ────────────────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function weekLanes(weekIdx) {
  const ws = new Date(viewStart.getTime() + weekIdx * WK);
  const we = new Date(ws.getTime() + WK);

  // Global trip spans: start = midnight of first event's day, end = midnight after last event's day
  const tripSpan = new Map();
  for (const ev of events) {
    if (!evVisible(ev)) continue;
    const key      = ev.tripId ?? null;
    const dayStart = new Date(ev.start.getFullYear(), ev.start.getMonth(), ev.start.getDate());
    const dayEnd   = new Date(ev.end.getFullYear(),   ev.end.getMonth(),   ev.end.getDate() + 1);
    if (!tripSpan.has(key)) {
      tripSpan.set(key, { start: dayStart, end: dayEnd });
    } else {
      const sp = tripSpan.get(key);
      if (dayStart < sp.start) sp.start = dayStart;
      if (dayEnd   > sp.end)   sp.end   = dayEnd;
    }
  }

  // Event segments for this week, keyed by tripId
  const byTrip = new Map();
  for (const ev of events) {
    if (!evVisible(ev)) continue;
    const seg = segments(ev).find(s => s.w === weekIdx);
    if (!seg) continue;
    const key = ev.tripId ?? null;
    if (!byTrip.has(key)) byTrip.set(key, []);
    byTrip.get(key).push({ ...seg, ev });
  }

  // Process trips in sidebar order; unassigned last
  const tripOrder = [...trips.map(t => t.id), null];
  const allSegs   = [];
  const tripBands = [];
  let   laneOffset = 0;

  for (const tripId of tripOrder) {
    const span = tripSpan.get(tripId);
    if (!span || span.end <= ws || span.start >= we) continue; // not in this week

    const tripSegs = byTrip.get(tripId) || [];
    const trip  = trips.find(t => t.id === tripId);
    const color = trip ? trip.color : '#94a3b8';

    // Greedy lane packing for events in this week
    tripSegs.sort((a, b) => a.left - b.left || b.width - a.width);
    const ends = [];
    for (const s of tripSegs) {
      let lane = 0;
      while (lane < ends.length && ends[lane] > s.left + 0.001) lane++;
      ends[lane] = s.left + s.width;
      s.lane = laneOffset + lane;
    }
    const tripLaneCount = Math.max(1, ends.length);

    // Band: clamp trip span to this week, expressed as % of week width
    const clampedStart  = Math.max(ws.getTime(), span.start.getTime());
    const clampedEnd    = Math.min(we.getTime(), span.end.getTime());
    const bandLeft      = (clampedStart - ws.getTime()) / WK * 100;
    const bandRight     = (clampedEnd   - ws.getTime()) / WK * 100;
    // Show border only at the true start/end of the trip (not at week boundaries)
    const showBorderL = clampedStart === span.start.getTime();
    const showBorderR = clampedEnd   === span.end.getTime();

    tripBands.push({ tripId, color, laneStart: laneOffset, laneCount: tripLaneCount, bandLeft, bandRight, showBorderL, showBorderR });
    allSegs.push(...tripSegs);
    laneOffset += tripLaneCount;
  }

  return { segs: allSegs, laneCount: Math.max(1, laneOffset), tripBands };
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  updatePeriodLabel();
  renderCal();
  save();
}

function updatePeriodLabel() {
  const end = addDays(viewStart, 69);
  document.getElementById('period-lbl').textContent =
    `${fmt(viewStart)} – ${fmt(end)}, ${end.getFullYear()}`;
  const p = n => String(n).padStart(2,'0');
  document.getElementById('date-pick').value =
    `${viewStart.getFullYear()}-${p(viewStart.getMonth()+1)}-${p(viewStart.getDate())}`;
}

function renderCal() {
  const body = document.getElementById('cal-body');
  const now  = new Date();
  let html   = '';

  for (let w = 0; w < 10; w++) {
    const ws = new Date(viewStart.getTime() + w * WK);
    const we = new Date(ws.getTime() + WK);
    const { segs, laneCount, tripBands } = weekLanes(w);
    const rowH = DATE_ROW + LANE_TOP + laneCount * (LANE_H + LANE_GAP) + ROW_PAD;

    // Trip lane bands (colored background strips per trip)
    let bands = '';
    for (const { tripId, color, laneStart, laneCount: lc, bandLeft, bandRight, showBorderL, showBorderR } of tripBands) {
      const bTop   = DATE_ROW + LANE_TOP + laneStart * (LANE_H + LANE_GAP) - 3;
      const bH     = lc * (LANE_H + LANE_GAP) - LANE_GAP + 6;
      const bW     = (bandRight - bandLeft).toFixed(3);
      const bl     = showBorderL ? `border-left:3px solid ${color};` : 'border-left:none;';
      const br     = showBorderR ? `border-right:3px solid ${color};` : 'border-right:none;';
      const tl     = showBorderL ? '4px' : '0';
      const tr     = showBorderR ? '4px' : '0';
      const radius = `border-radius:${tl} ${tr} ${tr} ${tl};`;
      bands += `<div class="trip-band" data-trip-id="${tripId ?? ''}" style="top:${bTop}px;height:${bH}px;left:${bandLeft.toFixed(3)}%;width:${bW}%;background:${hexToRgba(color,.07)};${bl}${br}${radius}"></div>`;
    }

    // Day columns + date numbers
    let dcols = '', dnums = '', noons = '', nights = '';
    const NIGHT_START = 21, NIGHT_END = 7; // 9pm → 7am
    for (let d = 0; d < 7; d++) {
      const dd    = addDays(ws, d);
      const L     = (d / 7 * 100).toFixed(3);
      const W     = (100 / 7).toFixed(3);
      const today = isToday(dd);
      const wkd   = d >= 5 ? ' weekend' : '';
      const iso = dd.toISOString().slice(0,10);
      dcols += `<div class="dcol${wkd}" style="left:${L}%;width:${W}%"></div>`;
      dnums += `<div class="dnum${today?' today':''}" style="left:calc(${L}% + 3px)">${dd.getDate()}</div>`;
      // Night zones: midnight→7am and 9pm→midnight
      const mL = (d / 7 * 100).toFixed(3);
      const mW = (NIGHT_END / 24 / 7 * 100).toFixed(3);
      const eL = ((d + NIGHT_START / 24) / 7 * 100).toFixed(3);
      const eW = ((24 - NIGHT_START) / 24 / 7 * 100).toFixed(3);
      nights += `<div class="night" style="left:${mL}%;width:${mW}%"></div>`;
      nights += `<div class="night" style="left:${eL}%;width:${eW}%"></div>`;
      // Now line (current time, today only)
      if (today) {
        const nowL = ((now - ws) / WK * 100).toFixed(3);
        noons += `<div class="now-line" style="left:${nowL}%"></div>`;
      }
      // Noon line at midpoint of each day column
      const noonL = ((d + 0.5) / 7 * 100).toFixed(3);
      noons += `<div class="noon-line" style="left:${noonL}%"></div>`;
    }

    // Event bars
    let bars = '';
    const linkDstIds = new Set(events.map(e => e.linkedNextId).filter(Boolean));
    for (const { ev, left, width, lane, isStart, isEnd } of segs) {
      const cat  = CATS[ev.category] || CATS.misc;
      const top  = DATE_ROW + LANE_TOP + lane * (LANE_H + LANE_GAP);
      const tl   = isStart ? '5px' : '0';
      const tr   = isEnd   ? '5px' : '0';
      const drag = dragState?.eventId === ev.id ? ' dragging' : '';
      const linkCls = (ev.linkedNextId ? ' link-src' : '') + (linkDstIds.has(ev.id) ? ' link-dst' : '');

      bars += `<div class="ev-bar${drag}${linkCls}" data-id="${ev.id}"
        style="left:calc(${left.toFixed(3)}% + 2px);width:calc(${width.toFixed(3)}% - 4px);top:${top}px;height:${LANE_H}px;background:${cat.bg};border:1.5px ${ev.tripId == null ? 'dashed' : 'solid'} ${cat.border};color:${cat.color};border-radius:${tl} ${tr} ${tr} ${tl}"
        onmousedown="barDown(event,${ev.id})"
        ondblclick="closePop();openForm(events.find(e=>e.id===${ev.id}))"
        onmouseenter="showBarHover(event,${ev.id})"
        onmouseleave="hideBarHover()"
      ><div class="ev-top"><span class="ev-icon">${cat.emoji}</span><span class="ev-dur">${fmtDur(ev.end-ev.start)}</span></div><div class="ev-bot">${isStart?'':'<span class="ev-cl">◀</span>'}<span class="ev-lbl">${esc(ev.title)}</span>${isEnd?'':'<span class="ev-cr">▶</span>'}</div></div>`;
    }

    const we_ = addDays(ws, 6);
    html += `
      <div class="week-row" data-w="${w}" style="height:${rowH}px">
        <div class="week-lbl">
          <span class="week-num">Week ${w+1}</span>
          <span class="week-dates">${fmt(ws)}<br>${fmt(we_)}</span>
        </div>
        <div class="timeline" data-w="${w}" ondblclick="timelineDblClick(event,${w})">${dcols}${bands}${nights}${noons}${dnums}${bars}</div>
      </div>`;
  }
  body.innerHTML = html;
}

// ── FORM ───────────────────────────────────────────────────────────────────────
function timelineDblClick(e, weekIdx) {
  if (e.target.closest('.ev-bar')) return;
  const day = dayUnderMouse(e);
  if (!day) return;

  // Find the latest event end on this day (any event overlapping it)
  const dayStart = new Date(day.getFullYear(), day.getMonth(), day.getDate());
  const dayEnd   = new Date(day.getFullYear(), day.getMonth(), day.getDate() + 1);
  let latestEnd  = null;
  for (const ev of events) {
    if (ev.start < dayEnd && ev.end > dayStart) {
      if (!latestEnd || ev.end.getTime() > latestEnd.getTime()) latestEnd = ev.end;
    }
  }

  // Use snapped end of latest event, or 9am if no events on this day
  let defaultStart;
  if (latestEnd) {
    defaultStart = snap15(latestEnd);
  } else {
    defaultStart = new Date(day);
    defaultStart.setHours(9, 0, 0, 0);
  }

  // Pre-select the trip whose band was double-clicked
  const band = e.target.closest('.trip-band');
  const bandTripId = band && band.dataset.tripId !== '' ? parseInt(band.dataset.tripId) : null;
  openForm(null, defaultStart, bandTripId);
}

function positionOverlay() {
  const overlay = document.getElementById('form-overlay');
  const r = document.getElementById('cal-area').getBoundingClientRect();
  const top    = Math.max(0, r.top);
  const left   = Math.max(0, r.left);
  const bottom = Math.min(window.innerHeight, r.bottom);
  const right  = Math.min(window.innerWidth,  r.right);
  overlay.style.top    = top  + 'px';
  overlay.style.left   = left + 'px';
  overlay.style.width  = (right - left) + 'px';
  overlay.style.height = (bottom - top) + 'px';
}

function openForm(evObj, defaultDate, defaultTripId) {
  const overlay = document.getElementById('form-overlay');
  positionOverlay();
  overlay.style.display = '';
  overlay.classList.remove('closed');
  setupAddressAutocomplete();
  refreshTripSelect();

  routeData = null;

  if (evObj) {
    editingId = evObj.id;
    document.getElementById('form-head').textContent = 'Edit Event';
    document.getElementById('btn-del').style.display = '';
    document.getElementById('f-title').value = evObj.title;
    document.getElementById('f-cat').value   = evObj.category;
    document.getElementById('f-trip').value  = evObj.tripId ?? '';
    setStartFields(evObj.start);
    const durMs = evObj.end - evObj.start;
    document.getElementById('f-dur-h').value = Math.floor(durMs / 3600000);
    document.getElementById('f-dur-m').value = Math.round((durMs % 3600000) / 60000);
    document.getElementById('f-desc').value  = evObj.description || '';
    // Sleeping fields
    const isSleeping = evObj.category === 'sleeping';
    document.getElementById('sleeping-fields').style.display = isSleeping ? '' : 'none';
    if (isSleeping) {
      document.getElementById('f-sleep-addr').value = evObj.sleepingAddress || '';
      updateSleepLink();
    }
    // Driving fields
    const isDriving = evObj.category === 'driving';
    document.getElementById('driving-fields').style.display = isDriving ? '' : 'none';
    if (isDriving) { updateLinkStatusBadges(evObj.id); } else { document.getElementById('link-status-row').style.display = 'none'; }
    if (isDriving) {
      document.getElementById('f-departure').value = evObj.departure || '';
      document.getElementById('f-arrival').value   = evObj.arrival   || '';
      updateAddrLink('departure'); updateAddrLink('arrival');
      const box = document.getElementById('route-result');
      if (evObj.distanceM != null) {
        routeData = { distanceM: evObj.distanceM, drivingSeconds: evObj.drivingSeconds, timeOnRoadH: evObj.timeOnRoadH ?? calcTimeOnRoad(evObj.distanceM / 1609.34) };
        renderRouteChip(box, evObj.departure || '', evObj.arrival || '', evObj.distanceM, evObj.drivingSeconds);
      } else {
        box.innerHTML = '<button class="btn btn-g" onclick="fetchRoute()" style="padding:5px 10px;font-size:12px">↗ Get route</button>';
      }
    }
  } else {
    editingId = null;
    document.getElementById('form-head').textContent = 'New Event';
    document.getElementById('btn-del').style.display = 'none';
    document.getElementById('f-title').value = '';
    document.getElementById('f-cat').value   = 'driving';
    document.getElementById('f-trip').value  = defaultTripId ?? lastTripId ?? '';
    const now = defaultDate ? snap15(defaultDate) : (() => { const d = new Date(); d.setHours(9, 0, 0, 0); return d; })();
    setStartFields(now);
    document.getElementById('f-dur-h').value = 1;
    document.getElementById('f-dur-m').value = 0;
    document.getElementById('f-desc').value  = '';
    // New events default to driving — show driving fields, hide sleeping
    document.getElementById('driving-fields').style.display  = '';
    document.getElementById('sleeping-fields').style.display = 'none';
    document.getElementById('link-status-row').style.display = 'none';
    document.getElementById('link-src-badge').style.display  = 'none';
    document.getElementById('link-dst-badge').style.display  = 'none';
    // Pre-fill departure from the previous driving event in the same trip (if it has an arrival)
    let prefillDep = '';
    if (lastTripId) {
      const now2 = defaultDate || new Date();
      const prevDriving = events
        .filter(e => e.tripId === lastTripId && e.category === 'driving' && e.end <= now2)
        .sort((a, b) => b.end - a.end)[0];
      if (prevDriving?.arrival) prefillDep = prevDriving.arrival;
    }
    document.getElementById('f-departure').value = prefillDep;
    document.getElementById('f-arrival').value   = '';
    updateAddrLink('departure'); updateAddrLink('arrival');
    document.getElementById('route-result').innerHTML =
      '<button class="btn btn-g" onclick="fetchRoute()" style="padding:5px 10px;font-size:12px">↗ Get route</button>';
    document.getElementById('f-sleep-addr').value = '';
    updateSleepLink();
  }
  setTimeout(() => document.getElementById('f-title').focus(), 60);
}

function closeForm() {
  const overlay = document.getElementById('form-overlay');
  overlay.classList.add('closed');
  editingId = null;
  routeData = null;
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('form-overlay')) closeForm();
}

function refreshTripSelect() {

  const cur = sel.value;
  sel.innerHTML = '<option value="">— None —</option>' +
